              <button type="button" onClick={() => setDarkMode(d => !d)} className={`mt-4 text-xs ${t.textMuted} hover:underline flex items-center gap-1 mx-auto`}>
                {darkMode ? <Icons.Sun className="w-4 h-4" aria-hidden="true" /> : <Icons.Moon className="w-4 h-4" aria-hidden="true" />} Toggle theme
              </button>
            </div>
            </div>
            <AppFooter t={t} />
          </div>
        );
      }

      // ============================================================
      // DASHBOARD VIEW
      // ============================================================
      const renderDashboard = () => {
        if (!institution) return null;
        const distro = [
          { label: 'Fully ZTC-able (100%)', hint: 'All requirements met with ZTC', n: institution.full, color: 'bg-green-500' },
          { label: 'High (75–99%)', hint: 'Most requirements met with ZTC', n: institution.high - institution.full, color: 'bg-green-400' },
          { label: 'Partial (51–74%)', hint: 'Some requirements met with ZTC', n: institution.partial, color: 'bg-amber-500' },
          { label: 'Low (0–50%)', hint: 'Few requirements met with ZTC', n: institution.low, color: 'bg-red-500' }
        ];
        const rankedAll = programs
          .map(p => ({ name: p.name, type: p.type, ...programAdoption[p.name] }))
          .filter(p => p.pct !== null && p.pct !== undefined);
        const ranked = showFullRanking ? rankedAll : rankedAll.slice(0, 10);
        const instSub = `All active pathways · term ${selectedTerm}`;
        return (
          <div className="p-6 pb-10 space-y-8">
            <div className={`rounded-xl border ${t.cardBorder} ${t.card} px-4 py-3.5 sm:px-5`}>
              <div className="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                <h2 className="text-2xl font-bold tracking-tight">Dashboard</h2>
                <div className="flex flex-wrap items-center gap-2">
                  <span className={`inline-flex items-center gap-1.5 rounded-lg border ${t.cardBorder} ${t.input} px-3 py-1.5 text-sm font-semibold`}>
                    <Icons.Layers className={`w-4 h-4 ${t.faint}`} aria-hidden="true" />
                    {programs.length} active pathways
                  </span>
                  <span className={`inline-flex items-center gap-1.5 rounded-lg border px-3 py-1.5 text-sm font-semibold ${darkMode ? 'border-blue-500/40 bg-blue-500/15 text-blue-300' : 'border-blue-300 bg-blue-50 text-blue-900'}`}>
                    Term <span className="font-bold">{selectedTerm}</span>
                  </span>
                </div>
              </div>
              <p className={`text-sm ${t.textMuted} mt-2.5 pt-2.5 border-t ${t.divider}`}>Institution-wide ZTC adoption · {instSub}</p>
            </div>

            {/* —— Needs attention —— */}
            {needsAttention.length > 0 && (
              <DashboardSection title="Needs attention" subtitle="Pathways below 50% requirement-based ZTC adoption">
                <div className="flex flex-wrap gap-2">
                  {needsAttention.map(p => (
                    <button key={p.name} type="button"
                      onClick={() => { setPathwayAdoptionFilter('all'); setSelectedProgram(p.name); setView('program'); }}
                      aria-label={`${p.name}. ZTC adoption ${p.pct}%. Open pathway view.`}
                      className={`inline-flex items-center gap-2 rounded-lg border ${t.cardBorder} ${t.card} px-3 py-2 text-sm ${t.cardHover} transition-colors`}>
                      <span className={`font-bold ${pctColor(p.pct, darkMode)}`}>{p.pct}%</span>
                      <span className="truncate max-w-[220px]">{p.name}</span>
                    </button>
                  ))}
                </div>
              </DashboardSection>
            )}

            {/* —— Institution overview —— */}
            <DashboardSection title="Institution overview" subtitle={instSub}>
              <div className="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
                {[
                  { label: 'Active pathways', val: institution.total, sub: `for ${selectedTerm}`, color: t.text, title: 'All active degree, certificate, and transfer pathways.', action: { view: 'program', pathwayAdoptionFilter: 'all', sortBy: 'name' } },
                  { label: 'Avg ZTC adoption', val: institution.avg === null ? '—' : institution.avg + '%', sub: `across ${institution.scored} scored`, color: pctColor(institution.avg, darkMode), title: 'Mean requirement-based ZTC adoption across all scored pathways.', action: { view: 'program', pathwayAdoptionFilter: 'scored', sortBy: 'adoption' } },
                  { label: 'Fully ZTC-able', val: institution.full, sub: '100% of requirements', color: darkMode ? 'text-green-400' : 'text-green-700', title: 'Pathways where every scored requirement can be met with ZTC courses.', action: { view: 'program', pathwayAdoptionFilter: 'full', sortBy: 'adoption' } },
                  { label: '≥75% ZTC-able', val: institution.high, sub: institution.full > 0 ? `${institution.full} at 100%` : 'requirement-based', color: darkMode ? 'text-green-400' : 'text-green-700', title: 'Pathways at or above the 75% requirement-based adoption threshold.', action: { view: 'program', pathwayAdoptionFilter: 'high', sortBy: 'adoption' } },
                  { label: 'Chaffey ZTC courses', val: institution.chaffeyZtcCourses, sub: `≥75% sections · of ${institution.coursesOffered} offered`, color: darkMode ? 'text-green-400' : 'text-green-700', title: 'Courses offered this term where at least 75% of sections are zero textbook cost (Chaffey ZTC threshold).', action: { view: 'courses', courseStatusFilter: 'ztc' } },
                  { label: "Chancellor's Office ZTC courses", val: institution.coZtcCourses, sub: `≥1 ZTC section · of ${institution.coursesOffered} offered`, color: darkMode ? 'text-violet-200' : 'text-violet-800', title: "Courses offered this term with at least one zero textbook cost section (Chancellor's Office ZTC threshold).", action: { view: 'courses', courseStatusFilter: 'co' } }
                ].map((kpi, i) => (
                  <button key={i} type="button" onClick={() => navigateFromOverviewKpi(kpi.action)}
                    aria-label={`${kpi.label}: ${kpi.val}. ${kpi.sub}. Open ${kpi.action.view === 'program' ? 'Pathway' : 'Courses'} view.`}
                    title={kpi.title}
                    className={`rounded-xl border ${t.cardBorder} ${t.card} p-5 text-left w-full ${t.cardHover} transition-colors cursor-pointer`}>
                    <div className={`text-xs uppercase tracking-wide ${t.textMuted} mb-1`}>{kpi.label}</div>
                    <div className={`text-3xl font-bold ${kpi.color}`}>{kpi.val}</div>
                    <div className={`text-[11px] ${t.faint} mt-1`}>{kpi.sub}</div>
                  </button>
                ))}
              </div>
              {institution.noData > 0 && (
                <p className={`text-xs ${t.textMuted} flex items-center gap-1.5`}>
                  <Icons.AlertCircle className="w-3.5 h-3.5 flex-shrink-0" aria-hidden="true" />
                  {institution.noData} pathway{institution.noData !== 1 ? 's' : ''} ha{institution.noData !== 1 ? 've' : 's'} no scored requirements for {selectedTerm} (excluded from averages).
                </p>
              )}

              {institutionTrend && (institutionTrend.avg.some(v => v !== null) || institutionTrend.survey.some(v => v !== null)) && (
                <div className={`rounded-xl border ${t.cardBorder} ${t.card} p-5`}>
                  <h3 className="font-semibold mb-1 flex items-center gap-2"><Icons.LineChart className="w-4 h-4 text-blue-400" aria-hidden="true" /> ZTC adoption &amp; survey completion over time</h3>
                  <p className={`text-xs ${t.textMuted} mb-3`}>Mean requirement-based adoption and average survey completion across all pathways, by term</p>
                  <TrendChart dark={darkMode} height={220}
                    ariaLabel="Line chart: institution-wide average ZTC adoption and average survey completion by term, with scored pathway counts per term"
                    summary={'By term: ' + trendSummary(institutionTrend.labels, [
                      { name: 'Avg ZTC adoption', data: institutionTrend.avg },
                      { name: 'Avg survey completion', data: institutionTrend.survey }
                    ]) + '. Scored pathways per term: ' + institutionTrend.labels.map((l, i) => `${l}: ${institutionTrend.scored[i]}`).join('; ') + '.'}
                    series={[
                      { label: 'Avg ZTC adoption', labels: institutionTrend.labels, data: institutionTrend.avg, color: '#22c55e' },
                      { label: 'Avg survey completion', labels: institutionTrend.labels, data: institutionTrend.survey, color: '#3b82f6' }
                    ]} />
                  <div className={`mt-3 flex flex-wrap gap-x-4 gap-y-1 text-[11px] ${t.faint}`} aria-hidden="true">
                    <span className="font-semibold uppercase tracking-wide">Scored per term:</span>
                    {institutionTrend.labels.map((l, i) => (
                      <span key={l}>{l} <span className="font-semibold">{institutionTrend.scored[i]}</span></span>
                    ))}
                  </div>
                </div>
              )}
            </DashboardSection>

            {/* —— Compare pathways —— */}
            <DashboardSection title="Compare pathways" subtitle="Distribution and ranking across all active pathways">
              <div className="grid gap-4 lg:grid-cols-2">
                <div className={`rounded-xl border ${t.cardBorder} ${t.card} p-5`}>
                  <h3 className="font-semibold mb-1">Distribution by ZTC-ability</h3>
                  <p className={`text-xs ${t.textMuted} mb-3`}>{institution.scored} scored pathway{institution.scored !== 1 ? 's' : ''} · requirement-based</p>
                  {distro.map((d, i) => {
                    const pct = institution.scored ? Math.round((d.n / institution.scored) * 100) : 0;
                    return (
                      <div key={i} role="img" aria-label={`${d.label}: ${d.n} pathways, ${pct} percent of scored pathways. ${d.hint}`} title={d.hint} className="mb-2.5">
                        <div className="flex justify-between text-xs mb-1 gap-2">
                          <span className={t.textMuted}>{d.label}</span>
                          <span className="font-semibold whitespace-nowrap">{d.n} · {pct}%</span>
                        </div>
                        <div className={`h-2.5 rounded-full ${t.track} overflow-hidden`}>
                          <div className={`h-full ${d.color} rounded-full transition-all`} style={{ width: pct + '%' }}></div>
                        </div>
                      </div>
                    );
                  })}
                </div>

                <div className={`rounded-xl border ${t.cardBorder} ${t.card} p-5 flex flex-col min-h-0`}>
                  <div className="flex items-center justify-between gap-2 mb-3 flex-wrap">
                    <div>
                      <h3 className="font-semibold">Top pathways by ZTC adoption</h3>
                      <p className={`text-xs ${t.textMuted}`}>Click a pathway to open detail view</p>
                    </div>
                    {rankedAll.length > 10 && (
                      <button type="button" onClick={() => setShowFullRanking(s => !s)} aria-expanded={showFullRanking}
                        className={`text-xs font-semibold px-2.5 py-1 rounded-lg border ${t.cardBorder} ${t.cardHover}`}>
                        {showFullRanking ? 'Show top 10' : `Show all ${rankedAll.length}`}
                      </button>
                    )}
                  </div>
                  <div className={`text-[10px] uppercase tracking-wide ${t.faint} grid grid-cols-[2rem_1fr_4.5rem_3rem_2.5rem] gap-2 px-2 mb-1 hidden sm:grid`}>
                    <span>#</span><span>Pathway</span><span className="text-right">ZTC</span><span className="text-right">Survey</span><span className="text-right">CO</span>
                  </div>
                  <div className="space-y-1 overflow-auto flex-1 max-h-[360px] pr-1">
                    {ranked.length === 0 ? (
                      <p className={`text-sm ${t.textMuted} px-2 py-4`}>No scored pathways for {selectedTerm}.</p>
                    ) : ranked.map((p, i) => {
                      const surveyLabel = p.survey === null ? 'no survey data' : p.survey + '% survey completion';
                      return (
                      <button key={p.name} type="button"
                        onClick={() => { setPathwayAdoptionFilter('all'); setSelectedProgram(p.name); setView('program'); }}
                        aria-label={`${i + 1}. ${p.name}. ZTC adoption ${p.pct}%. ${surveyLabel}.`}
                        className={`w-full text-left grid grid-cols-[2rem_1fr_auto] sm:grid-cols-[2rem_1fr_4.5rem_3rem_2.5rem] gap-2 items-center rounded-lg px-2 py-2 ${t.cardHover} transition-colors ${p.name === selectedProgram ? (darkMode ? 'bg-blue-500/10 border border-blue-500/40' : 'bg-blue-50 border border-blue-200') : 'border border-transparent'}`}>
                        <span className={`text-xs font-bold ${t.faint}`} aria-hidden="true">{i + 1}</span>
                        <span className="truncate text-sm">{p.name}</span>
                        <span className={`text-sm font-bold text-right ${pctColor(p.pct, darkMode)}`} aria-hidden="true">{p.pct}%</span>
                        <span className={`text-xs text-right hidden sm:block ${t.textMuted}`} aria-hidden="true">{p.survey === null ? '—' : p.survey + '%'}</span>
                        <span className={`text-xs text-right hidden sm:block ${t.faint}`} aria-hidden="true">{p.coCount ?? 0}</span>
                      </button>
                      );
                    })}
                  </div>
                </div>
              </div>
            </DashboardSection>
          </div>
        );
      };

      // ============================================================
      // PROGRAM VIEW
      // ============================================================
      const renderProgram = () => {
        if (!programView) return null;
        return (
          <div className="p-6 pb-10 overflow-visible">
            {/* program header */}
            <div className={`rounded-xl border ${t.cardBorder} ${t.card} p-5 mb-6`}>
              <div className="flex items-start gap-5 flex-wrap">
                <Ring pct={programView.adoptionPct} size={96} stroke={10} />
                <div className="flex-1 min-w-[240px]">
                  <span className={`text-[11px] ${t.chip} px-2 py-0.5 rounded-full`}>{activeProgram.type}</span>
                  <h2 className="text-xl font-bold mt-1.5 leading-snug">{activeProgram.name}</h2>
                  <p className={`text-sm ${t.textMuted} mt-1`}>
                    <span className={`font-semibold ${darkMode ? 'text-green-400' : 'text-green-700'}`}>{programView.reqZtc}</span> of <span className="font-semibold">{programView.reqTotal}</span> requirements can be met with zero textbook cost
                  </p>
                </div>
                <div className="grid grid-cols-3 gap-4 text-center">
                  <div>
                    <div className={`text-[10px] uppercase ${t.faint}`}>Required units</div>
                    <div className="text-xl font-bold">{fmtUnits(programView.unitsRequired)}</div>
                  </div>
                  <div>
                    <div className={`text-[10px] uppercase ${t.faint}`}>Courses w/ data</div>
                    <div className="text-xl font-bold">{programView.coursesWithData}<span className={`text-sm ${t.faint}`}>/{programView.coursesTotal}</span></div>
                  </div>
                  <div>
                    <div className={`text-[10px] uppercase ${t.faint}`}>Avg survey</div>
                    <div className="text-xl font-bold">{programView.avgSurvey === null ? '—' : programView.avgSurvey + '%'}</div>
                  </div>
                </div>
              </div>
            </div>

            {/* program trend */}
            {programTrend && (programTrend.ztc.some(v => v !== null) || programTrend.survey.some(v => v !== null)) && (
              <div className={`rounded-xl border ${t.cardBorder} ${t.card} p-5 mb-6`}>
                <div className="flex items-center justify-between mb-1">
                  <h3 className="font-semibold flex items-center gap-2"><Icons.LineChart className="w-4 h-4 text-blue-400" aria-hidden="true" /> ZTC adoption &amp; survey completion over time</h3>
                  <button type="button" onClick={() => setShowTrend(s => !s)} aria-expanded={showTrend}
                    className={`text-xs px-2.5 py-1 rounded-lg ${t.cardHover} border ${t.cardBorder}`}>
                    {showTrend ? 'Hide' : 'Show'} trend
                  </button>
                </div>
                {showTrend && (
                  <>
                    <p className={`text-xs ${t.textMuted} mb-3`}>This pathway across all terms. Selected term: <span className="font-semibold">{selectedTerm}</span></p>
                    <TrendChart dark={darkMode} height={220}
                      ariaLabel={`Line chart: ZTC adoption and average survey completion by term for ${activeProgram.name}`}
                      summary={'By term: ' + trendSummary(programTrend.labels, [
                        { name: 'ZTC adoption', data: programTrend.ztc },
                        { name: 'Avg survey completion', data: programTrend.survey }
                      ]) + '.'}
                      series={[
                        { label: 'ZTC adoption', labels: programTrend.labels, data: programTrend.ztc, color: '#22c55e' },
                        { label: 'Avg survey completion', labels: programTrend.labels, data: programTrend.survey, color: '#3b82f6' }
                      ]} />
                  </>
                )}
              </div>
            )}

            {/* badge legend */}
            <div className={`rounded-xl border ${t.cardBorder} ${t.card} px-4 py-3 mb-6`}>
              <h3 className="sr-only">Badge legend</h3>
              <dl className="flex flex-wrap items-center gap-x-6 gap-y-2 text-xs">
                <div className="flex items-center gap-2">
                  <dt><StatusBadge status="ztc" small dark={darkMode} /></dt>
                  <dd className={t.textMuted}>Chaffey ZTC — 75%+ of sections are zero textbook cost</dd>
                </div>
                <div className="flex items-center gap-2">
                  <dt><CoBadge small dark={darkMode} /></dt>
                  <dd className={t.textMuted}>Chancellor&rsquo;s Office ZTC — at least one ZTC section</dd>
                </div>
              </dl>
            </div>

            {/* areas */}
            <div className="space-y-5">
              {programView.areas.map((area) => (
                <div key={area.id} id={`area-${area.id}`} className={`rounded-xl border ${t.cardBorder} ${t.panel} overflow-hidden scroll-mt-4`}>
                  <div className={`flex items-center justify-between gap-3 px-4 py-3 border-b ${t.divider}`}>
                    <div className="min-w-0">
                      <div className="font-bold text-sm sm:text-base truncate">{area.title}</div>
                      <div className={`text-[11px] ${t.textMuted}`}>
                        {area.isChoice ? `Choose ${area.requiredCount || 1}` : 'All required'}
                        {area.dataCount > 0 && <span> · {area.ztcCount}/{area.dataCount} options ZTC</span>}
                      </div>
                    </div>
                    <div className="flex items-center gap-3 flex-shrink-0">
                      <div className="text-right">
                        <div className={`text-[10px] uppercase ${t.faint}`}>units</div>
                        <div className="font-semibold text-sm">{area.unitsLabel || '—'}</div>
                      </div>
                      {area.areaPct !== null && (
                        area.satisfiable
                          ? <span className={`inline-flex items-center gap-1 rounded-full bg-green-500/20 ${darkMode ? 'text-green-300' : 'text-green-800'} border border-green-500/40 px-2.5 py-1 text-xs font-semibold`}><Icons.Check className="w-3.5 h-3.5" aria-hidden="true" />ZTC path</span>
                          : <span className={`text-sm font-bold ${pctColor(area.areaPct, darkMode)}`}>{area.areaPct}%</span>
                      )}
                    </div>
                  </div>
                  <div className="p-3 space-y-3">
                    {area.subgroups.map((sg) => (
                      <div key={sg.id}>
                        {sg.title && sg.title !== area.title && (
                          <div className={`text-xs font-semibold ${t.textMuted} px-1 mb-1.5`}>{sg.title}</div>
                        )}
                        <div className="space-y-1.5">
                          {sg.courses.map((c, i) => (
                            <CourseRow key={sg.id + '-' + i} c={c} t={t} dark={darkMode} selectedTerm={selectedTerm}
                              onOpen={(course, el) => { lastFocusedRef.current = el; setSelectedCourse(course); }} />
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      };

      // ============================================================
      // COURSES VIEW
      // ============================================================
      const renderCourseView = () => {
        if (!filteredCourses.length) {
          return (
            <div className="p-6 pb-10">
              <p className={`text-sm ${t.textMuted}`}>No courses match the current filters for term {selectedTerm}.</p>
            </div>
          );
        }
        const c = activeCourse;
        if (!c) return null;
        return (
          <div className="p-6 pb-10 overflow-visible">
            <div className={`rounded-xl border ${t.cardBorder} ${t.card} p-5 mb-6`}>
              <div className="flex items-start justify-between gap-4 flex-wrap">
                <div className="min-w-0">
                  <h2 className="text-2xl font-bold">{c.subject}-{c.number}</h2>
                  <p className={`text-sm ${t.textMuted} mt-1`}>{c.courseTitle || c.analyticsTitle}</p>
                  <p className={`text-xs ${t.faint} mt-0.5`}>Term: {selectedTerm}</p>
                </div>
                <div className="flex flex-wrap items-center gap-2">
                  <StatusBadge status={c.status} dark={darkMode} />
                  {c.coZtc && <CoBadge dark={darkMode} />}
                </div>
              </div>
            </div>

            <CourseDetail c={c} analytics={analytics} selectedTerm={selectedTerm} t={t} dark={darkMode}
              showCatalogLink={recentTerms.has(selectedTerm)} />
          </div>
        );
      };

      // ============================================================
      // COURSE DETAIL MODAL
      // ============================================================
      const renderCourseModal = () => {
        const c = selectedCourse;
        if (!c) return null;
        return (
          <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 animate-fadeIn"
            onClick={(e) => { if (e.target === e.currentTarget) setSelectedCourse(null); }}>
            <div ref={courseModalRef} role="dialog" aria-modal="true" aria-labelledby="course-modal-title" tabIndex={-1}
              className={`${t.panel} ${t.text} rounded-xl border ${t.panelBorder} max-w-lg w-full max-h-[90vh] overflow-auto animate-scaleIn focus:outline-none`}>
              <div className="p-6">
                <div className="flex items-start justify-between mb-5">
                  <div>
                    <h3 id="course-modal-title" className="text-2xl font-bold">{c.subject}-{c.number}</h3>
                    <p className={`text-sm ${t.textMuted}`}>{c.courseTitle || c.analyticsTitle}</p>
                    <p className={`text-xs ${t.faint} mt-0.5`}>Term: {selectedTerm}{c.units !== null ? ` · ${fmtUnits(c.units)} units` : ''}</p>
                  </div>
                  <button type="button" onClick={() => setSelectedCourse(null)} aria-label="Close course details" className={`p-2 rounded-lg ${t.cardHover}`}><Icons.X className="w-5 h-5" aria-hidden="true" /></button>
                </div>

                <CourseDetail compact c={c} analytics={analytics} selectedTerm={selectedTerm} t={t} dark={darkMode} />
              </div>
            </div>
          </div>
        );
      };

      // ============================================================
      // EXPORTS
      // ============================================================
      const downloadFile = (content, filename, type) => {
        const blob = new Blob([content], { type });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename; a.click();
        URL.revokeObjectURL(url);
      };
      const csvEscape = (v) => {
        const s = String(v ?? '');
        return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
      };
      const exportProgramCSV = () => {
        if (!programView) return;
        const rows = [['Program', 'Area', 'Sub-area', 'Course', 'Course Title', 'Units', 'Term', 'ZTC %', 'Survey %', 'Chaffey ZTC (75%+)', 'CO ZTC (1+ section)', 'Status']];
        for (const area of programView.areas) {
          for (const sg of area.subgroups) {
            for (const c of sg.courses) {
              rows.push([activeProgram.name, area.title, sg.title || '', `${c.subject}-${c.number}`, c.courseTitle || c.analyticsTitle || '', c.units ?? '', selectedTerm, c.ztcPct ?? '', c.surveyPct ?? '', c.status === 'ztc' ? 'Yes' : 'No', c.coZtc ? 'Yes' : 'No', c.status]);
            }
          }
        }
        downloadFile(rows.map(r => r.map(csvEscape).join(',')).join('\n'), `ztc-${activeProgram.name.replace(/[^a-z0-9]+/gi, '-').slice(0, 50)}-${selectedTerm.replace('/', '')}.csv`, 'text/csv');
      };
      const exportAllProgramsCSV = () => {
        const rows = [['Program', 'Type', 'Term', 'ZTC Adoption %', 'Requirements ZTC', 'Requirements Total', 'Required Units', 'Avg Survey %', 'CO ZTC Courses (1+ section)']];
        for (const p of programs) {
          const a = programAdoption[p.name];
          rows.push([p.name, p.type, selectedTerm, a.pct ?? '', a.reqZtc, a.reqTotal, a.units, a.survey ?? '', a.coCount ?? 0]);
        }
        downloadFile(rows.map(r => r.map(csvEscape).join(',')).join('\n'), `ztc-all-programs-${selectedTerm.replace('/', '')}.csv`, 'text/csv');
      };
      const exportProgramPDF = () => {
        if (!programView) return;
        if (!window.jspdf) {
          setStorageNotice('PDF export is unavailable — the PDF library did not load. Try refreshing the page.');
          return;
        }
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(14); doc.text(activeProgram.name, 14, 16);
        doc.setFontSize(10); doc.setTextColor(120);
        doc.text(`${activeProgram.type} · Term ${selectedTerm} · ZTC adoption ${programView.adoptionPct ?? '—'}% (${programView.reqZtc}/${programView.reqTotal} requirements) · ${fmtUnits(programView.unitsRequired)} units`, 14, 22);
        const body = [];
        for (const area of programView.areas) {
          for (const sg of area.subgroups) {
            for (const c of sg.courses) {
              body.push([area.title.slice(0, 26), `${c.subject}-${c.number}`, (c.courseTitle || c.analyticsTitle || '').slice(0, 30), c.units ?? '', c.ztcPct === null ? '—' : c.ztcPct + '%', c.surveyPct === null ? '—' : c.surveyPct + '%', c.coZtc ? 'Yes' : '—', c.status]);
            }
          }
        }
        doc.autoTable({
          startY: 28, head: [['Area', 'Course', 'Title', 'Units', 'ZTC', 'Survey', 'CO ZTC', 'Status']], body,
          styles: { fontSize: 7 }, headStyles: { fillColor: [37, 99, 235] }
        });
        doc.save(`ztc-${activeProgram.name.replace(/[^a-z0-9]+/gi, '-').slice(0, 50)}-${selectedTerm.replace('/', '')}.pdf`);
      };

      // ============================================================
      // SHELL
      // ============================================================
      return (
        <div className={`h-screen flex flex-col overflow-hidden ${t.bg} ${t.text}`}>
          <a href="#main-content" className="skip-link">Skip to main content</a>
          <h1 className="sr-only">ZTC Pathway Mapper</h1>
          <div className="sr-only" role="status" aria-live="polite">{announce}</div>
          {storageNotice && (
            <div role="alert" className={`flex-shrink-0 flex items-center justify-between gap-3 px-4 py-2 text-sm border-b ${darkMode ? 'bg-amber-500/15 border-amber-500/40 text-amber-200' : 'bg-amber-50 border-amber-200 text-amber-900'}`}>
              <span className="flex items-center gap-2"><Icons.AlertCircle className="w-4 h-4 flex-shrink-0" aria-hidden="true" />{storageNotice}</span>
              <button type="button" onClick={() => setStorageNotice('')} aria-label="Dismiss storage notice" className={`p-1 rounded ${t.cardHover}`}><Icons.X className="w-4 h-4" aria-hidden="true" /></button>
            </div>
          )}
          {/* top bar */}
          <header className={`${t.header} backdrop-blur border-b ${t.headerBorder} flex items-center gap-3 px-4 py-2.5 flex-shrink-0`}>
            <Icons.Landmark className="w-6 h-6 text-blue-400 flex-shrink-0" aria-hidden="true" />
            <span className="font-bold hidden sm:inline" aria-hidden="true">ZTC Pathway Mapper</span>
            <nav aria-label="Views" className="flex items-center gap-1 ml-2">
              <button type="button" onClick={() => switchView('dashboard')} aria-current={view === 'dashboard' ? 'page' : undefined} className={`px-3 py-1.5 rounded-lg text-sm font-medium ${view === 'dashboard' ? 'bg-blue-600 text-white' : t.cardHover}`}>Dashboard</button>
              <button type="button" onClick={() => switchView('program')} aria-current={view === 'program' ? 'page' : undefined} className={`px-3 py-1.5 rounded-lg text-sm font-medium ${view === 'program' ? 'bg-blue-600 text-white' : t.cardHover}`}>Pathway</button>
              <button type="button" onClick={() => switchView('courses')} aria-current={view === 'courses' ? 'page' : undefined} className={`px-3 py-1.5 rounded-lg text-sm font-medium ${view === 'courses' ? 'bg-blue-600 text-white' : t.cardHover}`}>Courses</button>
            </nav>
            <div className="flex-1"></div>
            <div className="flex items-center gap-2">
              <span className={`text-xs font-semibold ${t.textMuted} hidden sm:inline`}>Term</span>
              <ThemedSelect value={selectedTerm} onChange={setSelectedTerm}
                options={terms.map(tm => ({ value: tm, label: tm }))}
                ariaLabel="Select term" t={t} dark={darkMode} align="right"
                buttonClassName="font-semibold text-sm py-1.5 px-2.5 min-w-[5.5rem]" menuClassName="w-36" />
            </div>
            <div className="relative">
              <button type="button" ref={exportBtnRef} onClick={() => setExportOpen(o => !o)} aria-haspopup="menu" aria-expanded={exportOpen}
                aria-label="Export data" className={`p-2 rounded-lg ${t.cardHover}`}><Icons.Download className="w-5 h-5" aria-hidden="true" /></button>
              {exportOpen && (
                <div ref={exportMenuRef} role="menu" aria-label="Export options"
                  className={`absolute right-0 mt-1 w-56 rounded-lg border ${t.panelBorder} ${t.panel} shadow-xl p-1 z-40`}>
                  {view !== 'dashboard' && (
                    <>
                      <button type="button" role="menuitem" onClick={() => { exportProgramCSV(); setExportOpen(false); }} className={`w-full text-left text-sm px-3 py-2 rounded ${t.cardHover}`}>Current pathway (CSV)</button>
                      <button type="button" role="menuitem" onClick={() => { exportProgramPDF(); setExportOpen(false); }} className={`w-full text-left text-sm px-3 py-2 rounded ${t.cardHover}`}>Current pathway (PDF)</button>
                    </>
                  )}
                  <button type="button" role="menuitem" onClick={() => { exportAllProgramsCSV(); setExportOpen(false); }} className={`w-full text-left text-sm px-3 py-2 rounded ${t.cardHover}`}>All pathways summary (CSV)</button>
                </div>
              )}
            </div>
            <button type="button" onClick={() => setDarkMode(d => !d)} aria-label={darkMode ? 'Switch to light mode' : 'Switch to dark mode'} className={`p-2 rounded-lg ${t.cardHover}`}>
              {darkMode ? <Icons.Sun className="w-5 h-5" aria-hidden="true" /> : <Icons.Moon className="w-5 h-5" aria-hidden="true" />}
            </button>
            <button type="button" onClick={resetData} aria-label="Load new data" className={`p-2 rounded-lg ${t.cardHover}`}><Icons.Refresh className="w-5 h-5" aria-hidden="true" /></button>
          </header>

          <div className="flex-1 flex min-h-0">
            {/* sidebar — Pathway and Courses only */}
            {view !== 'dashboard' && (
            <aside aria-label={view === 'courses' ? 'Courses' : 'Pathways'} className={`w-72 lg:w-80 flex-shrink-0 border-r ${t.headerBorder} ${t.sidebar} flex flex-col min-h-0`}>
              {view === 'courses' ? (
                <>
                  <div className={`p-3 space-y-2 border-b ${t.headerBorder}`}>
                    <SidebarSearch value={search} onChange={setSearch} label="Search courses" placeholder="Search courses…" t={t} />
                    <div className="flex gap-2">
                      <ThemedSelect value={courseStatusFilter} onChange={setCourseStatusFilter}
                        options={COURSE_STATUS_OPTIONS}
                        ariaLabel="Filter by ZTC status" t={t} dark={darkMode} className="flex-1 min-w-0"
                        buttonClassName="text-xs py-1.5 px-2" menuClassName="w-56" />
                      <ThemedSelect value={sortBy} onChange={setSortBy} options={COURSE_SORT_OPTIONS}
                        ariaLabel="Sort courses by" t={t} dark={darkMode}
                        buttonClassName="text-xs py-1.5 px-2" menuClassName="w-32" />
                    </div>
                    <div className={`text-[11px] ${t.textMuted} px-1`} aria-live="polite">{filteredCourses.length} of {allCourses.length} courses</div>
                  </div>
                  <ul className="flex-1 overflow-auto p-2 space-y-1 list-none m-0">
                    {filteredCourses.map(c => {
                      const sel = c.key === selectedCourseKey;
                      const pctLabel = c.ztcPct == null ? 'no data' : c.ztcPct + '%';
                      const surveyLabel = c.surveyPct === null ? 'no survey data' : c.surveyPct + '% survey completion';
                      const title = c.courseTitle || c.analyticsTitle || '';
                      return (
                        <li key={c.key}>
                          <button type="button" onClick={() => setSelectedCourseKey(c.key)}
                            aria-current={sel ? 'true' : undefined}
                            aria-label={`${c.subject}-${c.number}, ${title}. ZTC adoption ${pctLabel}. ${surveyLabel}.`}
                            className={`w-full text-left rounded-lg px-3 py-2 border ${sel ? 'border-blue-500/60 bg-blue-500/10' : 'border-transparent ' + t.cardHover}`}>
                            <div className="grid grid-cols-[4.5rem_1fr] gap-x-2 items-center">
                              <span className={`text-sm font-bold text-right tabular-nums shrink-0 ${pctColor(c.ztcPct, darkMode)}`} aria-hidden="true">{c.ztcPct == null ? '—' : c.ztcPct + '%'}</span>
                              <span className="text-sm leading-snug min-w-0">
                                <span className="font-mono font-semibold">{c.subject}-{c.number}</span>
                                {title && <span className={`block text-[11px] ${t.textMuted} truncate`}>{title}</span>}
                              </span>
                            </div>
                            <div className={`mt-1 ml-[5rem] h-1.5 rounded-full ${t.track} overflow-hidden`} aria-hidden="true">
                              <div className={`h-full ${barColor(c.ztcPct)}`} style={{ width: (c.ztcPct || 0) + '%' }}></div>
                            </div>
                          </button>
                        </li>
                      );
                    })}
                  </ul>
                </>
              ) : (
                <>
                  <div className={`p-3 space-y-2 border-b ${t.headerBorder}`}>
                    <SidebarSearch value={search} onChange={setSearch} label="Search pathways" placeholder="Search pathways…" t={t} />
                    <div className="flex gap-2">
                      <ThemedSelect value={typeFilter} onChange={setTypeFilter}
                        options={[{ value: 'all', label: 'All types' }, ...programTypes.map(tp => ({ value: tp, label: tp }))]}
                        ariaLabel="Filter by type" t={t} dark={darkMode} className="flex-1 min-w-0"
                        buttonClassName="text-xs py-1.5 px-2" menuClassName="w-56" />
                      <ThemedSelect value={sortBy} onChange={setSortBy} options={SORT_BY_OPTIONS}
                        ariaLabel="Sort pathways by" t={t} dark={darkMode}
                        buttonClassName="text-xs py-1.5 px-2" menuClassName="w-32" />
                    </div>
                    <div className={`text-[11px] ${t.textMuted} px-1`} aria-live="polite">
                      {filteredPrograms.length} of {programs.length} active pathways
                      {pathwayAdoptionFilter !== 'all' && (
                        <span className={`block ${t.faint} mt-0.5`}>Filter: {PATHWAY_ADOPTION_FILTER_LABELS[pathwayAdoptionFilter]}</span>
                      )}
                    </div>
                  </div>
                  <ul className="flex-1 overflow-auto p-2 space-y-1 list-none m-0">
                    {filteredPrograms.map(p => {
                      const a = programAdoption[p.name];
                      const sel = p.name === selectedProgram;
                      const pctLabel = a?.pct == null ? 'no data' : a.pct + '%';
                      return (
                        <li key={p.name}>
                        <button type="button" onClick={() => setSelectedProgram(p.name)}
                          aria-current={sel ? 'true' : undefined}
                          aria-label={`${p.name}. ZTC adoption ${pctLabel}.`}
                          className={`w-full text-left rounded-lg px-3 py-2 border ${sel ? 'border-blue-500/60 bg-blue-500/10' : 'border-transparent ' + t.cardHover}`}>
                          <div className="flex items-center gap-2">
                            <span className={`text-sm font-bold w-11 text-right ${pctColor(a?.pct, darkMode)}`} aria-hidden="true">{a?.pct == null ? '—' : a.pct + '%'}</span>
                            <span className="text-sm leading-snug line-clamp-2 flex-1">{p.name}</span>
                          </div>
                          <div className={`mt-1 ml-[52px] h-1.5 rounded-full ${t.track} overflow-hidden`} aria-hidden="true">
                            <div className={`h-full ${barColor(a?.pct)}`} style={{ width: (a?.pct || 0) + '%' }}></div>
                          </div>
                        </button>
                        </li>
                      );
                    })}
                  </ul>
                </>
              )}
              {savedAt && <div className={`px-3 py-2 text-[10px] ${t.faint} border-t ${t.headerBorder}`}>Data cached locally · {new Date(savedAt).toLocaleString()}</div>}
            </aside>
            )}

            {/* main */}
            <main id="main-content" tabIndex={-1} aria-label={view === 'dashboard' ? 'Dashboard' : view === 'courses' ? 'Course details' : 'Pathway details'} className="flex-1 min-w-0 min-h-0 overflow-y-auto overflow-x-hidden focus:outline-none">
              {view === 'dashboard' ? renderDashboard() : view === 'courses' ? renderCourseView() : renderProgram()}
            </main>
          </div>

          <AppFooter t={t} />

          {selectedCourse && renderCourseModal()}
        </div>
      );
    };

    if (!window.__ZTC_VENDOR_MISSING__) {
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    }
  </script>
</body>
</html>
