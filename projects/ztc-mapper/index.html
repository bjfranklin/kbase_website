<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZTC Pathway Mapper</title>

  <!-- Tailwind CSS (offline — regenerate: scripts/generate-tailwind-css.sh) -->
  <link rel="stylesheet" href="vendor/tailwind.min.css">

  <!-- Vendored runtime (pinned — see vendor/deps.json; verify: scripts/check-deps.py) -->
  <!-- No crossorigin / no SRI integrity attrs: both break file:// opens; CI verifies sha384. -->
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <!-- Babel 7.x only: Babel 8 defaults preset-react to automatic JSX runtime,
       which emits `import {jsx} from "react/jsx-runtime"` and breaks UMD globals. -->
  <script src="vendor/babel.min.js"></script>
  <script src="vendor/jspdf.umd.min.js"></script>
  <script src="vendor/jspdf.plugin.autotable.min.js"></script>
  <script src="vendor/chart.umd.min.js"></script>

  <script>
    // If index.html was opened without the vendor/ folder, show a clear error (not a blank page).
    (function () {
      var missing = [];
      if (typeof React === 'undefined') missing.push('React');
      if (typeof ReactDOM === 'undefined') missing.push('ReactDOM');
      if (typeof Babel === 'undefined') missing.push('Babel');
      if (!missing.length) return;
      var hosted = 'https://www.chairmanx.tech/projects/ztc-mapper/';
      var html = '<div role="alert" style="max-width:36rem;margin:2rem auto;padding:1.25rem 1.5rem;font-family:system-ui,sans-serif;line-height:1.5;color:#e2e8f0;background:#1e293b;border:1px solid #475569;border-radius:0.75rem">'
        + '<h1 style="margin:0 0 0.75rem;font-size:1.125rem;font-weight:700;color:#f8fafc">ZTC Pathway Mapper — missing files</h1>'
        + '<p style="margin:0 0 0.75rem">This copy of <strong>index.html</strong> cannot run alone. Required libraries in the <code style="color:#93c5fd">vendor/</code> folder did not load'
        + (missing.length ? ' (' + missing.join(', ') + ').' : '.') + '</p>'
        + '<p style="margin:0 0 0.75rem"><strong>For most users:</strong> open the hosted app (includes all files):<br>'
        + '<a href="' + hosted + '" style="color:#60a5fa">' + hosted + '</a></p>'
        + '<p style="margin:0;font-size:0.875rem;color:#94a3b8">Offline use: unzip or copy the <strong>entire</strong> <code>ztc-mapper</code> project folder, then open <code>index.html</code> from that folder.</p></div>';
      function show() {
        var el = document.getElementById('root');
        if (el) el.innerHTML = html;
      }
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', show);
      else show();
      window.__ZTC_VENDOR_MISSING__ = true;
    })();
  </script>

  <script>
    // Apply the saved theme before first paint to avoid a flash of the wrong theme.
    // Key must match STORAGE_KEY + '-theme' in the app script below.
    (function () {
      try {
        const theme = localStorage.getItem('ztc-pathway-mapper-v3-theme')
          || localStorage.getItem('ztc-pathway-mapper-v2-theme');
        if (theme === 'light') document.documentElement.classList.add('theme-light');
      } catch (e) { /* ignore */ }
    })();
  </script>
  <style>
    html { color-scheme: dark; }
    html.theme-light { color-scheme: light; }

    /* Theme-aware scrollbars (default = dark). Firefox uses scrollbar-color. */
    html { scrollbar-color: #475569 #0f172a; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }

    html.theme-light { scrollbar-color: #94a3b8 #e2e8f0; }
    html.theme-light ::-webkit-scrollbar-track { background: #e2e8f0; }
    html.theme-light ::-webkit-scrollbar-thumb { background: #94a3b8; }
    html.theme-light ::-webkit-scrollbar-thumb:hover { background: #64748b; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-fadeIn { animation: fadeIn 0.18s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.18s ease-out; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }

    /* Strong, consistent focus indicator for keyboard users */
    *:focus-visible { outline: 3px solid #3b82f6; outline-offset: 2px; border-radius: 4px; }

    /* Visually-hidden but available to screen readers */
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
    /* Skip link: hidden until focused */
    .skip-link {
      position: absolute; left: 8px; top: -48px; z-index: 100;
      background: #2563eb; color: #fff; padding: 8px 14px; border-radius: 8px;
      transition: top 0.15s ease; font-weight: 600;
    }
    .skip-link:focus { top: 8px; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }
    }

    /* Single scroll surface: prevent body overscroll past app shell */
    html, body { height: 100%; margin: 0; overflow: hidden; }
    #root { height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // ============================================================
    // ICONS
    // ============================================================
    const Icon = (paths) => (props) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" strokeWidth="2"
        strokeLinecap="round" strokeLinejoin="round" aria-hidden="true" {...props}>
        {paths}
      </svg>
    );
    const Icons = {
      Download: Icon(<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></>),
      Search: Icon(<><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></>),
      X: Icon(<><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></>),
      Check: Icon(<><polyline points="20 6 9 17 4 12"></polyline></>),
      CheckCircle: Icon(<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></>),
      AlertCircle: Icon(<><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></>),
      Sun: Icon(<><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></>),
      Moon: Icon(<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>),
      BarChart3: Icon(<><path d="M3 3v18h18"></path><path d="M18 17V9"></path><path d="M13 17V5"></path><path d="M8 17v-3"></path></>),
      Landmark: Icon(<><line x1="3" y1="22" x2="21" y2="22"></line><line x1="6" y1="18" x2="6" y2="11"></line><line x1="10" y1="18" x2="10" y2="11"></line><line x1="14" y1="18" x2="14" y2="11"></line><line x1="18" y1="18" x2="18" y2="11"></line><polygon points="12 2 20 7 4 7"></polygon></>),
      BookOpen: Icon(<><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></>),
      ChevronRight: Icon(<polyline points="9 18 15 12 9 6"></polyline>),
      ChevronDown: Icon(<polyline points="6 9 12 15 18 9"></polyline>),
      Layers: Icon(<><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></>),
      Refresh: Icon(<><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></>),
      FileText: Icon(<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></>),
      Shield: Icon(<><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"></path><path d="m9 12 2 2 4-4"></path></>),
      LineChart: Icon(<><path d="M3 3v18h18"></path><path d="m7 12 4-4 4 4 6-6"></path></>)
    };

    // ============================================================
    // CONSTANTS
    // ============================================================
    // ZTC_MIN/PARTIAL_MIN = Chaffey internal adoption thresholds (% of sections).
    // CO_MIN_SECTIONS = Chancellor's Office definition: ZTC-passing with >=1 ZTC section.
    const ZTC_THRESHOLDS = { ZTC_MIN: 75, PARTIAL_MIN: 51, CO_MIN_SECTIONS: 1 };
    const STORAGE_KEY = 'ztc-pathway-mapper-v3';
    const LEGACY_STORAGE_KEY = 'ztc-pathway-mapper-v2';
    const COURSE_CATALOG_URL = 'https://colss-prod.ec.chaffey.edu/Student/Courses/Search?keyword=';
    const APP_HOSTED_URL = 'https://www.chairmanx.tech/projects/ztc-mapper/';
    const APP_META = {
      contact: 'Bradley Franklin',
      department: 'Instructional Systems & Pathways Innovation',
      useLine: 'Internal — ZTC / OER',
      accessibility: 'WCAG 2.1 Level AA',
      a11yNote: 'Status labels include text, not color alone.',
      hostedUrl: APP_HOSTED_URL
    };

    const SORT_BY_OPTIONS = [
      { value: 'adoption', label: 'ZTC %' },
      { value: 'name', label: 'Name' },
      { value: 'units', label: 'Units' }
    ];
    const COURSE_SORT_OPTIONS = [
      { value: 'adoption', label: 'ZTC %' },
      { value: 'name', label: 'Name' },
      { value: 'survey', label: 'Survey %' }
    ];
    const COURSE_STATUS_OPTIONS = [
      { value: 'all', label: 'All statuses' },
      { value: 'ztc', label: 'ZTC' },
      { value: 'co', label: 'CO ZTC' },
      { value: 'partial', label: 'Partial' },
      { value: 'not-ztc', label: 'Not ZTC' },
      { value: 'no-data', label: 'No data' }
    ];

    const THEME = {
      dark: {
        bg: 'bg-slate-950', text: 'text-slate-100', textMuted: 'text-slate-300', faint: 'text-slate-400',
        header: 'bg-slate-900/95', headerBorder: 'border-slate-800',
        card: 'bg-slate-800/50', cardHover: 'hover:bg-slate-800', cardBorder: 'border-slate-700/60',
        panel: 'bg-slate-900', panelBorder: 'border-slate-800',
        input: 'bg-slate-800 border-slate-700 text-slate-100', divider: 'border-slate-800',
        chip: 'bg-slate-800 text-slate-200', sidebar: 'bg-slate-900/60', track: 'bg-slate-700/50'
      },
      light: {
        bg: 'bg-gray-50', text: 'text-gray-900', textMuted: 'text-gray-600', faint: 'text-gray-600',
        header: 'bg-white/95', headerBorder: 'border-gray-200',
        card: 'bg-white', cardHover: 'hover:bg-gray-50', cardBorder: 'border-gray-200',
        panel: 'bg-white', panelBorder: 'border-gray-200',
        input: 'bg-white border-gray-300 text-gray-900', divider: 'border-gray-200',
        chip: 'bg-gray-200 text-gray-800', sidebar: 'bg-gray-100/60', track: 'bg-gray-200'
      }
    };

    // ============================================================
    // UTILITIES
    // ============================================================
    // Lenient numeric parsing for CSV cells: strips "%" and ",", null on blank/NaN.
    const parseNum = (v, int = false) => {
      if (v === null || v === undefined || v === '') return null;
      const s = String(v).replace(/[%,]/g, '');
      const n = int ? parseInt(s, 10) : parseFloat(s);
      return Number.isNaN(n) ? null : n;
    };
    const parsePct = (v) => parseNum(v);
    const parseUnits = (v) => parseNum(v);
    const parseCount = (v) => parseNum(v, true);
    const fmtUnits = (n) => (n === null || n === undefined) ? '' : (Math.round(n * 100) / 100).toString();

    // Robust CSV parser: handles quoted fields with embedded commas + newlines.
    const parseCSV = (text) => {
      if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1); // strip BOM
      text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
      const rows = [];
      let row = [], field = '', inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        if (inQuotes) {
          if (c === '"') {
            if (text[i + 1] === '"') { field += '"'; i++; }
            else inQuotes = false;
          } else field += c;
        } else {
          if (c === '"') inQuotes = true;
          else if (c === ',') { row.push(field); field = ''; }
          else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
          else field += c;
        }
      }
      if (field !== '' || row.length > 0) { row.push(field); rows.push(row); }
      return rows.filter(r => r.length > 1 || (r.length === 1 && r[0].trim() !== ''));
    };

    // Term ordering: YYYY/SP, YYYY/SU, YYYY/FA
    const SEM_ORDER = { SP: 0, SU: 1, FA: 2 };
    const termRank = (t) => {
      const m = String(t || '').trim().match(/^(\d{4})\/(SP|SU|FA)$/i);
      if (!m) return -1;
      return parseInt(m[1], 10) * 10 + (SEM_ORDER[m[2].toUpperCase()] ?? 9);
    };
    const sortTerms = (terms) => terms.slice().sort((a, b) => termRank(a) - termRank(b));
    const getRecentTerms = (terms, count = 2) => sortTerms(terms).slice(-count);

    // Normalize a SUBJECT-NUMBER join key
    const normKey = (subject, number) => {
      const s = String(subject || '').trim().toUpperCase().replace(/\s+/g, '');
      const n = String(number || '').trim().toUpperCase().replace(/\s+/g, '');
      if (!s || !n) return '';
      return `${s}-${n}`;
    };
    const normCourseField = (v) => String(v || '').trim().toUpperCase().replace(/\s+/g, '');
    const parseCourseKey = (key) => {
      const idx = key.lastIndexOf('-');
      if (idx <= 0) return { subject: key, number: '' };
      return { subject: key.slice(0, idx), number: key.slice(idx + 1) };
    };

    // Header lookup helpers
    const findIdx = (headers, candidates) => {
      const norm = headers.map(h => String(h).trim().toLowerCase());
      for (const cand of candidates) {
        const i = norm.indexOf(cand.toLowerCase());
        if (i !== -1) return i;
      }
      for (const cand of candidates) {
        const i = norm.findIndex(h => h.includes(cand.toLowerCase()));
        if (i !== -1) return i;
      }
      return -1;
    };

    // ZTC status from adoption percentage
    const ztcStatus = (pct) => {
      if (pct === null || pct === undefined) return 'no-data';
      if (pct >= ZTC_THRESHOLDS.ZTC_MIN) return 'ztc';
      if (pct >= ZTC_THRESHOLDS.PARTIAL_MIN) return 'partial';
      return 'not-ztc';
    };
    // Theme-aware so colored numbers meet >=4.5:1 contrast on light backgrounds too.
    const pctColor = (pct, dark = true) => {
      if (pct === null || pct === undefined) return dark ? 'text-slate-400' : 'text-gray-600';
      if (pct >= ZTC_THRESHOLDS.ZTC_MIN) return dark ? 'text-green-400' : 'text-green-800';
      if (pct >= ZTC_THRESHOLDS.PARTIAL_MIN) return dark ? 'text-amber-400' : 'text-amber-800';
      return dark ? 'text-red-400' : 'text-red-800';
    };
    const ringColor = (pct) => {
      if (pct === null || pct === undefined) return '#64748b';
      if (pct >= ZTC_THRESHOLDS.ZTC_MIN) return '#22c55e';
      if (pct >= ZTC_THRESHOLDS.PARTIAL_MIN) return '#f59e0b';
      return '#ef4444';
    };
    const barColor = (pct) => {
      if (pct === null || pct === undefined) return 'bg-slate-500';
      if (pct >= ZTC_THRESHOLDS.ZTC_MIN) return 'bg-green-500';
      if (pct >= ZTC_THRESHOLDS.PARTIAL_MIN) return 'bg-amber-500';
      return 'bg-red-500';
    };
    // Border + tint for the big stat card, keyed on ZTC status (no-data renders red, matching legacy behavior).
    const statusBorderCls = (pct) => {
      const s = ztcStatus(pct);
      if (s === 'ztc') return 'border-green-500/40 bg-green-500/10';
      if (s === 'partial') return 'border-amber-500/40 bg-amber-500/10';
      return 'border-red-500/40 bg-red-500/10';
    };
    // Descending numeric compare with nulls last; ties defer to tie().
    const cmpNullLast = (ax, ay, tie) => {
      if (ax == null && ay == null) return tie();
      if (ax == null) return 1;
      if (ay == null) return -1;
      return ay - ax;
    };

    const pathwayAdoptionMatches = (pct, filter) => {
      if (filter === 'all') return true;
      if (filter === 'scored') return pct !== null && pct !== undefined;
      if (filter === 'full') return pct === 100;
      if (filter === 'high') return pct !== null && pct !== undefined && pct >= ZTC_THRESHOLDS.ZTC_MIN;
      return true;
    };

    const courseStatusMatches = (c, filter) => {
      if (filter === 'all') return true;
      if (filter === 'co') return c.coZtc;
      return c.status === filter;
    };

    const PATHWAY_ADOPTION_FILTER_LABELS = {
      scored: 'Scored pathways',
      full: '100% adoption',
      high: '≥75% adoption'
    };

    // Program type classification (from program title)
    const programType = (name) => {
      const n = (name || '').toLowerCase();
      if (/general education|cal-getc|getc|igetc|csu ge|transfer curriculum/.test(n)) return 'GE / Transfer Pattern';
      if (/transfer|a[ds]-t|aa-t|as-t/.test(n)) return 'Transfer Degree';
      if (/certificate/.test(n)) return 'Certificate';
      if (/degree|a\.s\.|a\.a\.|associate/.test(n)) return 'Degree';
      return 'Other';
    };

    // ---- Block-title parsing: requirement + area grouping ----
    const cleanTitle = (t) => String(t || '').replace(/\s+/g, ' ').replace(/\s*:\s*$/, '').trim();

    const parseRequirement = (title) => {
      const s = (title || '').toLowerCase();
      const numWord = { one: 1, two: 2, three: 3, four: 4, 'a minimum of one': 1 };
      let m = s.match(/\b(one|two|three|four)\s+courses?\b/);
      if (!m) m = s.match(/\b(?:choose|select|complete)\s+(one|two|three|four)\b/);
      if (!m) m = s.match(/\bat least\s+(one|two|three|four)\b/);
      if (m) return { choice: true, n: numWord[m[1]] || 1 };
      const md = s.match(/\b(\d+)\s+courses?\b/);
      if (md) return { choice: true, n: parseInt(md[1], 10) };
      // "Required" / "Required Core" => all listed courses required
      if (/required|core/.test(s)) return { choice: false, n: null };
      return { choice: null, n: null }; // unknown -> inherit / default all
    };

    // ---- Area ordering / nesting helpers ----
    const looksLikeArea = (title) => /^area\b/i.test(cleanTitle(title));
    // A bare sub-item like "A - Arts", "1A - ...", "B2 - ..." (not an "AREA n" header)
    const looksLikeSubItem = (title) => {
      const s = cleanTitle(title);
      if (looksLikeArea(s)) return false;
      return /^(\d+)?[A-Za-z]\b\s*[-:]/.test(s) || /^(\d+)[A-Za-z]\b/.test(s);
    };
    // Numeric/letter ordering key for a top-level AREA (null if not an AREA header)
    const areaNumKey = (title) => {
      const s = cleanTitle(title);
      let m = s.match(/^AREA\s+(\d+)/i); if (m) return parseInt(m[1], 10);
      m = s.match(/^AREA\s+([A-Z])\b/i); if (m) return m[1].toUpperCase().charCodeAt(0) - 64;
      return null;
    };
    // Ordering key for a sub-group title (1A/3B -> by letter; A/B/C -> by letter)
    const subOrderKey = (title) => {
      if (!title) return null;
      const s = cleanTitle(title);
      let m = s.match(/^(\d+)([A-Z])\b/i); if (m) return parseInt(m[1], 10) * 100 + (m[2].toUpperCase().charCodeAt(0) - 64);
      m = s.match(/^([A-Z])\b\s*[-:]/i); if (m) return m[1].toUpperCase().charCodeAt(0) - 64;
      m = s.match(/^(\d+)\b/); if (m) return parseInt(m[1], 10);
      return null;
    };
    // Stable sort by key, but only reorder when EVERY item has a key (else keep order)
    const sortByKey = (arr, keyFn) => {
      const wk = arr.map((a, i) => ({ a, i, k: keyFn(a) }));
      if (wk.every(x => x.k !== null)) wk.sort((x, y) => (x.k - y.k) || (x.i - y.i));
      return wk.map(x => x.a);
    };

    // Extract a grouping token used to nest leaf blocks under area headers
    const areaGroupToken = (title) => {
      const s = cleanTitle(title);
      let m = s.match(/^AREA\s+([A-Z0-9]+)/i);
      if (m) return 'G' + m[1].toUpperCase();
      m = s.match(/^(\d+)[A-Z]\b/);            // 1A, 3B
      if (m) return 'G' + m[1];
      m = s.match(/^([A-Z])\d\b/);             // C2, B1
      if (m) return 'G' + m[1].toUpperCase();
      m = s.match(/^(\d+)\b/);                 // leading number
      if (m) return 'G' + m[1];
      return null;
    };

    // ============================================================
    // MODEL BUILDERS
    // ============================================================
    // Analytics index: key -> { title, terms: { term -> metrics } }
    const buildAnalytics = (rows) => {
      const headers = rows[0];
      const data = rows.slice(1);
      const I = {
        course: findIdx(headers, ['course']),
        title: findIdx(headers, ['course title', 'title']),
        term: findIdx(headers, ['sec term', 'term']),
        total: findIdx(headers, ['total sections term', 'total sections']),
        ztcSec: findIdx(headers, ['ztc sections term', 'ztc sections']),
        surveysSub: findIdx(headers, ['surveys submitted term', 'surveys submitted']),
        surveysPend: findIdx(headers, ['pending surveys term', 'pending surveys']),
        surveyPct: findIdx(headers, ['survey completion pct term', 'survey completion']),
        ztcPct: findIdx(headers, ['ztc percent term', 'ztc percent']),
        ztca: findIdx(headers, ['oer ztca percent term']),
        ztcc: findIdx(headers, ['oer ztcc percent term']),
        ztce: findIdx(headers, ['oer ztce percent term']),
        ztcf: findIdx(headers, ['oer ztcf percent term']),
        ztcg: findIdx(headers, ['oer ztcg percent term']),
        lct: findIdx(headers, ['lct percent term'])
      };
      if (I.course === -1 || I.term === -1 || I.ztcPct === -1) {
        throw new Error('Course Analytics file is missing required columns (Course, Sec Term, Ztc Percent Term).');
      }
      const index = {};
      const termSet = new Set();
      for (const r of data) {
        const key = normCourseField(r[I.course]);
        if (!key) continue;
        const term = String(r[I.term] || '').trim();
        if (!term) continue;
        termSet.add(term);
        if (!index[key]) index[key] = { title: (r[I.title] || '').trim(), terms: {} };
        if (!index[key].title && I.title !== -1) index[key].title = (r[I.title] || '').trim();
        index[key].terms[term] = {
          ztcPct: parsePct(r[I.ztcPct]),
          surveyPct: I.surveyPct !== -1 ? parsePct(r[I.surveyPct]) : null,
          surveysSub: I.surveysSub !== -1 ? parseCount(r[I.surveysSub]) : null,
          surveysPend: I.surveysPend !== -1 ? parseCount(r[I.surveysPend]) : null,
          totalSec: I.total !== -1 ? parseCount(r[I.total]) : null,
          ztcSec: I.ztcSec !== -1 ? parseCount(r[I.ztcSec]) : null,
          ztca: I.ztca !== -1 ? parsePct(r[I.ztca]) : null,
          ztcc: I.ztcc !== -1 ? parsePct(r[I.ztcc]) : null,
          ztce: I.ztce !== -1 ? parsePct(r[I.ztce]) : null,
          ztcf: I.ztcf !== -1 ? parsePct(r[I.ztcf]) : null,
          ztcg: I.ztcg !== -1 ? parsePct(r[I.ztcg]) : null,
          lct: I.lct !== -1 ? parsePct(r[I.lct]) : null
        };
      }
      return { index, terms: sortTerms(Array.from(termSet)) };
    };

    // Programs: active only -> nested areas -> subgroups -> courses
    const buildPrograms = (rows) => {
      const headers = rows[0];
      const data = rows.slice(1);
      const I = {
        title: findIdx(headers, ['program entity title']),
        status: findIdx(headers, ['program status']),
        subj: findIdx(headers, ['program_course block_course block item course subject code', 'course subject code']),
        num: findIdx(headers, ['program_course block_course block item course number', 'course block item course number']),
        cTitle: findIdx(headers, ['program_course block_course block item course title', 'course block item course title']),
        block: findIdx(headers, ['course block title']),
        minU: findIdx(headers, ['min units'])
      };
      if (I.title === -1 || I.subj === -1 || I.num === -1 || I.block === -1) {
        throw new Error('Program Summary file is missing required columns (Program Entity Title, Subject Code, Course Number, Course Block Title).');
      }
      // group rows by program (active only), preserving block + course order
      const progMap = new Map();
      for (const r of data) {
        const status = (I.status !== -1 ? r[I.status] : 'Active') || '';
        if (status.trim().toLowerCase() !== 'active') continue;
        const pname = (r[I.title] || '').trim();
        if (!pname) continue;
        const blockRaw = (r[I.block] || '').trim();
        const key = normKey(r[I.subj], r[I.num]);
        if (!progMap.has(pname)) progMap.set(pname, { name: pname, blockOrder: [], blocks: new Map() });
        const prog = progMap.get(pname);
        const bClean = cleanTitle(blockRaw) || '(Untitled block)';
        if (!prog.blocks.has(bClean)) {
          prog.blocks.set(bClean, { title: bClean, raw: blockRaw, courses: [], courseKeys: new Set() });
          prog.blockOrder.push(bClean);
        }
        const blk = prog.blocks.get(bClean);
        if (key && !blk.courseKeys.has(key)) {
          blk.courseKeys.add(key);
          blk.courses.push({
            key,
            subject: String(r[I.subj] || '').trim(),
            number: String(r[I.num] || '').trim(),
            courseTitle: I.cTitle !== -1 ? (r[I.cTitle] || '').trim() : '',
            units: I.minU !== -1 ? parseUnits(r[I.minU]) : null
          });
        }
      }

      // Build areas from ordered blocks. When adjacency=true, bare-letter sub-items
      // (e.g. "A - Arts") are buffered and attached to the next area header.
      const buildAreas = (blocksInOrder, adjacency) => {
        const isHeaderOnly = b => b.courses.length === 0;
        const headersByGroup = new Map(); // group token -> header block title (no courses)
        for (const b of blocksInOrder) if (isHeaderOnly(b)) { const g = areaGroupToken(b.title); if (g && !headersByGroup.has(g)) headersByGroup.set(g, b.title); }
        const areas = [];
        const areaByTitle = new Map();
        const ensureArea = (title) => {
          if (!areaByTitle.has(title)) {
            const node = { id: 'a' + areas.length, title, requirement: parseRequirement(title), subgroups: [], isHeaderArea: true };
            areas.push(node); areaByTitle.set(title, node);
          }
          return areaByTitle.get(title);
        };
        const standalone = (b, req) => {
          const node = { id: 'a' + areas.length, title: b.title, requirement: req, subgroups: [{ id: 'a' + areas.length + '-0', title: null, requirement: req, courses: b.courses }], isHeaderArea: false };
          areas.push(node); areaByTitle.set(b.title, node);
        };
        const attach = (area, b, leafReq) => {
          const req = leafReq.choice === null ? area.requirement : leafReq;
          area.subgroups.push({ id: area.id + '-' + area.subgroups.length, title: b.title, requirement: req, courses: b.courses });
        };
        let buffer = [];
        const flushStandalone = () => { for (const o of buffer) standalone(o.b, o.req); buffer = []; };
        for (const b of blocksInOrder) {
          if (isHeaderOnly(b)) { const area = ensureArea(b.title); for (const o of buffer) attach(area, o.b, o.req); buffer = []; continue; }
          const g = areaGroupToken(b.title);
          const leafReq = parseRequirement(b.title);
          const parentTitle = g ? headersByGroup.get(g) : null;
          if (parentTitle && parentTitle !== b.title) { flushStandalone(); attach(ensureArea(parentTitle), b, leafReq); }
          else if (adjacency && looksLikeSubItem(b.title)) { buffer.push({ b, req: leafReq }); }
          else { flushStandalone(); standalone(b, leafReq); }
        }
        flushStandalone();
        return areas.filter(a => a.subgroups.length > 0);
      };

      // Only reorder/nest when the result is a clean, uniquely-numbered AREA set
      // (e.g. Cal-GETC: AREA 1..6). Otherwise keep the original layout untouched.
      const isCleanNumbered = (areas) => {
        if (areas.length < 2) return false;
        const keys = areas.map(a => areaNumKey(a.title));
        if (keys.some(k => k === null)) return false;
        return new Set(keys).size === keys.length;
      };

      const programs = [];
      for (const prog of progMap.values()) {
        const blocksInOrder = prog.blockOrder.map(t => prog.blocks.get(t));
        const areasNew = buildAreas(blocksInOrder, true);
        let areas;
        if (isCleanNumbered(areasNew)) {
          areas = sortByKey(areasNew, a => areaNumKey(a.title));
          for (const a of areas) a.subgroups = sortByKey(a.subgroups, sg => subOrderKey(sg.title));
        } else {
          areas = buildAreas(blocksInOrder, false);
        }
        programs.push({ name: prog.name, type: programType(prog.name), areas });
      }
      programs.sort((a, b) => a.name.localeCompare(b.name));
      return programs;
    };

    // ============================================================
    // PROGRAM METRIC COMPUTATION (per selected term)
    // ============================================================
    const courseMetrics = (analytics, key, term) => {
      const rec = analytics.index[key];
      if (!rec) return { found: false, offered: false, m: null, title: '' };
      const m = rec.terms[term];
      if (!m) return { found: true, offered: false, m: null, title: rec.title };
      return { found: true, offered: true, m, title: rec.title };
    };

    // Merge per-term analytics into a course descriptor. `base` carries whatever
    // is already known (subject/number/title/units from the Program Summary file).
    const enrichCourse = (base, analytics, term) => {
      const cm = courseMetrics(analytics, base.key, term);
      const pct = cm.offered ? cm.m.ztcPct : null;
      return {
        units: null,
        ...base,
        analyticsTitle: cm.title,
        offered: cm.offered,
        found: cm.found,
        ztcPct: pct,
        surveyPct: cm.offered ? cm.m.surveyPct : null,
        status: ztcStatus(pct),
        // Chancellor's Office definition: ZTC-passing with >=1 ZTC section
        coZtc: !!(cm.offered && cm.m.ztcSec !== null && cm.m.ztcSec >= ZTC_THRESHOLDS.CO_MIN_SECTIONS),
        metrics: cm.offered ? cm.m : null
      };
    };

    const enrichCourseFromKey = (key, analytics, term) =>
      enrichCourse({ key, ...parseCourseKey(key), courseTitle: '' }, analytics, term);

    // Build an enriched view for one program at a given term
    const computeProgramView = (program, analytics, term) => {
      let reqTotal = 0, reqZtc = 0;
      let coursesWithData = 0, coursesTotal = 0;
      let surveySum = 0, surveyN = 0;
      let unitsRequired = 0;
      let coCount = 0;

      const areas = program.areas.map(area => {
        const subgroups = area.subgroups.map(sg => {
          const courses = sg.courses.map(c => enrichCourse(c, analytics, term));
          return { ...sg, courses };
        });
        const allCourses = subgroups.flatMap(sg => sg.courses);
        const withData = allCourses.filter(c => c.offered && c.ztcPct !== null);
        const anyZtc = withData.some(c => c.ztcPct >= ZTC_THRESHOLDS.ZTC_MIN);
        const ztcCount = withData.filter(c => c.ztcPct >= ZTC_THRESHOLDS.ZTC_MIN).length;
        const req = area.requirement || { choice: null, n: null };
        const isChoice = req.choice === true;

        // requirement-based rollup contribution
        let aReqTotal = 0, aReqZtc = 0;
        if (isChoice) {
          if (withData.length > 0) { aReqTotal = 1; aReqZtc = anyZtc ? 1 : 0; }
        } else {
          aReqTotal = withData.length;
          aReqZtc = ztcCount;
        }
        reqTotal += aReqTotal; reqZtc += aReqZtc;

        // survey aggregation (all offered courses with survey data)
        for (const c of allCourses) {
          coursesTotal += 1;
          if (c.offered && c.ztcPct !== null) coursesWithData += 1;
          if (c.offered && c.surveyPct !== null) { surveySum += c.surveyPct; surveyN += 1; }
          if (c.coZtc) coCount += 1;
        }

        // required units
        const optionUnits = allCourses.map(c => c.units).filter(u => u !== null);
        let unitsLabel = '', unitsMin = 0;
        if (isChoice) {
          const n = req.n || 1;
          const sorted = optionUnits.slice().sort((a, b) => a - b);
          const lo = sorted.slice(0, n).reduce((s, u) => s + u, 0);
          const hi = sorted.slice(-n).reduce((s, u) => s + u, 0);
          unitsMin = lo;
          unitsLabel = lo === hi ? fmtUnits(lo) : `${fmtUnits(lo)}–${fmtUnits(hi)}`;
        } else {
          const sum = optionUnits.reduce((s, u) => s + u, 0);
          unitsMin = sum; unitsLabel = fmtUnits(sum);
        }
        unitsRequired += unitsMin;

        const areaPct = aReqTotal > 0 ? Math.round((aReqZtc / aReqTotal) * 100) : null;
        return {
          ...area, subgroups,
          isChoice, requiredCount: req.n,
          unitsLabel, anyZtc, ztcCount, dataCount: withData.length,
          areaPct, satisfiable: isChoice ? anyZtc : (withData.length > 0 && ztcCount === withData.length)
        };
      });

      const adoptionPct = reqTotal > 0 ? Math.round((reqZtc / reqTotal) * 100) : null;
      const avgSurvey = surveyN > 0 ? Math.round(surveySum / surveyN) : null;
      return {
        areas, adoptionPct, reqTotal, reqZtc,
        coursesWithData, coursesTotal, avgSurvey, coCount,
        unitsRequired: Math.round(unitsRequired * 100) / 100
      };
    };

    // Institution rollup from all active pathways (institution KPIs are not sidebar-filtered).
    const computeInstitutionStats = (programList, adoptionMap) => {
      const vals = programList.map(p => adoptionMap[p.name]?.pct).filter(v => v !== null && v !== undefined);
      const avg = vals.length ? Math.round(vals.reduce((s, v) => s + v, 0) / vals.length) : null;
      return {
        total: programList.length,
        scored: vals.length,
        noData: programList.length - vals.length,
        avg,
        full: vals.filter(v => v >= 100).length,
        high: vals.filter(v => v >= ZTC_THRESHOLDS.ZTC_MIN).length,
        partial: vals.filter(v => v >= ZTC_THRESHOLDS.PARTIAL_MIN && v < ZTC_THRESHOLDS.ZTC_MIN).length,
        low: vals.filter(v => v < ZTC_THRESHOLDS.PARTIAL_MIN).length
      };
    };

    // ============================================================
    // SMALL COMPONENTS
    // ============================================================
    const DashboardSection = ({ title, subtitle, badge, children }) => (
      <section className="space-y-4">
        <div className="flex items-start justify-between gap-3 flex-wrap">
          <div>
            <h2 className="text-lg font-bold tracking-tight">{title}</h2>
            {subtitle && <p className="text-sm opacity-70 mt-0.5">{subtitle}</p>}
          </div>
          {badge}
        </div>
        {children}
      </section>
    );

    const AppFooter = ({ t }) => (
      <footer role="contentinfo" className={`flex-shrink-0 border-t ${t.headerBorder} ${t.header} px-4 py-2 text-center`}>
        <h2 className="sr-only">Application information</h2>
        <p className={`text-[10px] leading-snug ${t.textMuted} my-0.5`}>
          <strong className={`font-semibold ${t.text}`}>Contact:</strong> {APP_META.contact} · {APP_META.department}
        </p>
        <p className={`text-[10px] leading-snug ${t.textMuted} my-0.5`}>
          {APP_META.useLine} · {APP_META.accessibility} · {APP_META.a11yNote}
        </p>
        <p className={`text-[10px] leading-snug ${t.textMuted} my-0.5`}>
          <strong className={`font-semibold ${t.text}`}>Hosted app:</strong>{' '}
          <a href={APP_META.hostedUrl} className="underline hover:opacity-90">{APP_META.hostedUrl}</a>
        </p>
      </footer>
    );

    const SidebarSearch = ({ value, onChange, label, placeholder, t }) => (
      <div className={`flex items-center gap-2 rounded-lg border ${t.cardBorder} ${t.input} px-2.5 py-1.5`}>
        <Icons.Search className={`w-4 h-4 ${t.faint}`} aria-hidden="true" />
        <input value={value} onChange={(e) => onChange(e.target.value)} aria-label={label} placeholder={placeholder} className="bg-transparent text-sm outline-none w-full" />
        {value && <button type="button" onClick={() => onChange('')} aria-label="Clear search"><Icons.X className="w-4 h-4" aria-hidden="true" /></button>}
      </div>
    );
    const Ring = ({ pct, size = 72, stroke = 8, label }) => {
      const r = (size - stroke) / 2;
      const c = 2 * Math.PI * r;
      const val = pct === null || pct === undefined ? 0 : pct;
      const off = c - (val / 100) * c;
      const text = pct === null || pct === undefined ? 'no data' : pct + '%';
      return (
        <svg width={size} height={size} className="flex-shrink-0" role="img"
          aria-label={`${label || 'ZTC adoption'}: ${text}`}>
          <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="rgba(148,163,184,0.25)" strokeWidth={stroke} />
          <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={ringColor(pct)} strokeWidth={stroke}
            strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round"
            transform={`rotate(-90 ${size / 2} ${size / 2})`} style={{ transition: 'stroke-dashoffset 0.4s ease' }} />
          <text x="50%" y="50%" dominantBaseline="central" textAnchor="middle"
            fill={ringColor(pct)} fontSize={size * 0.26} fontWeight="700">
            {pct === null || pct === undefined ? '—' : pct + '%'}
          </text>
        </svg>
      );
    };

    const StatusBadge = ({ status, small, dark = true }) => {
      // Text shades chosen for >=4.5:1 contrast against the translucent tint on each theme.
      const cfg = {
        'ztc': ['bg-green-500/20 border-green-500/40', dark ? 'text-green-300' : 'text-green-800', 'ZTC'],
        'partial': ['bg-amber-500/20 border-amber-500/40', dark ? 'text-amber-200' : 'text-amber-800', 'Partial'],
        'not-ztc': ['bg-red-500/20 border-red-500/40', dark ? 'text-red-300' : 'text-red-800', 'Not ZTC'],
        'no-data': ['bg-slate-500/25 border-slate-500/50', dark ? 'text-slate-200' : 'text-slate-700', 'No data']
      }[status] || ['bg-slate-500/25 border-slate-500/50', dark ? 'text-slate-200' : 'text-slate-700', '—'];
      return (
        <span className={`inline-flex items-center rounded-full border ${cfg[0]} ${cfg[1]} ${small ? 'px-2 py-0.5 text-[10px]' : 'px-2.5 py-1 text-xs'} font-semibold`}>
          {cfg[2]}
        </span>
      );
    };

    // Purple Chancellor's Office ZTC identifier (course has >=1 ZTC section).
    // Distinct from the green Chaffey badge (>=75% of sections ZTC).
    const CoBadge = ({ small, dark = true }) => (
      <span role="img" aria-label="Chancellor's Office ZTC: at least one section is zero textbook cost"
        title="Chancellor's Office ZTC — at least one section is offered at Zero Textbook Cost (Chaffey's internal bar is 75%+ of sections)."
        className={`inline-flex items-center gap-1 rounded-full border border-violet-500/50 bg-violet-500/20 ${dark ? 'text-violet-200' : 'text-violet-800'} ${small ? 'px-1.5 py-0.5 text-[10px]' : 'px-2.5 py-1 text-xs'} font-semibold`}>
        <Icons.Landmark className={small ? 'w-3 h-3' : 'w-3.5 h-3.5'} aria-hidden="true" /> CO ZTC
      </span>
    );

    // Custom listbox — native <select> popups ignore theme CSS on macOS.
    const ThemedSelect = ({ value, onChange, options, ariaLabel, t, dark, className = '', buttonClassName = '', align = 'left', menuClassName = '' }) => {
      const [open, setOpen] = useState(false);
      const [activeIdx, setActiveIdx] = useState(0);
      const rootRef = useRef(null);
      const btnRef = useRef(null);
      const display = options.find(o => o.value === value)?.label ?? value;
      const selectedIdx = Math.max(0, options.findIndex(o => o.value === value));

      useEffect(() => {
        if (!open) return;
        setActiveIdx(selectedIdx);
        const onDown = (e) => {
          if (rootRef.current && !rootRef.current.contains(e.target)) setOpen(false);
        };
        const onKey = (e) => {
          if (e.key === 'Escape') {
            e.preventDefault();
            setOpen(false);
            btnRef.current?.focus();
            return;
          }
          if (e.key === 'ArrowDown') {
            e.preventDefault();
            setActiveIdx(i => Math.min(i + 1, options.length - 1));
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            setActiveIdx(i => Math.max(i - 1, 0));
          } else if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            const pick = options[activeIdx];
            if (pick) { onChange(pick.value); setOpen(false); btnRef.current?.focus(); }
          }
        };
        document.addEventListener('mousedown', onDown);
        document.addEventListener('keydown', onKey);
        return () => {
          document.removeEventListener('mousedown', onDown);
          document.removeEventListener('keydown', onKey);
        };
      }, [open, activeIdx, options, onChange, selectedIdx]);

      const pickedCls = dark ? 'bg-blue-600/30 font-semibold' : 'bg-blue-50 text-blue-900 font-semibold';
      const activeCls = dark ? 'bg-slate-700/70' : 'bg-gray-100';

      return (
        <div ref={rootRef} className={`relative ${className}`}>
          <button ref={btnRef} type="button"
            aria-haspopup="listbox" aria-expanded={open} aria-label={ariaLabel}
            onClick={() => setOpen(o => !o)}
            className={`w-full flex items-center justify-between gap-2 rounded-lg border ${t.cardBorder} ${t.input} cursor-pointer ${buttonClassName}`}>
            <span className="truncate text-left flex-1">{display}</span>
            <Icons.ChevronDown className={`w-4 h-4 flex-shrink-0 opacity-70 transition-transform ${open ? 'rotate-180' : ''}`} aria-hidden="true" />
          </button>
          {open && (
            <ul role="listbox" aria-label={ariaLabel}
              className={`absolute z-50 mt-1 max-h-64 overflow-auto rounded-lg border ${t.panelBorder} ${t.panel} shadow-xl py-1 list-none m-0 ${align === 'right' ? 'right-0' : 'left-0'} min-w-full ${menuClassName}`}>
              {options.map((opt, i) => {
                const isSelected = opt.value === value;
                const isActive = i === activeIdx;
                return (
                  <li key={opt.value} role="presentation">
                    <button type="button" role="option" aria-selected={isSelected}
                      className={`w-full text-left px-3 py-2 text-sm transition-colors ${isSelected ? pickedCls : ''} ${!isSelected && isActive ? activeCls : ''} ${!isSelected ? t.cardHover : ''}`}
                      onMouseEnter={() => setActiveIdx(i)}
                      onClick={() => { onChange(opt.value); setOpen(false); btnRef.current?.focus(); }}>
                      <span className="flex items-center gap-2">
                        <span className="w-4 flex-shrink-0 flex items-center justify-center" aria-hidden="true">
                          {isSelected ? <Icons.Check className="w-4 h-4 text-blue-500" /> : null}
                        </span>
                        <span className="leading-snug">{opt.label}</span>
                      </span>
                    </button>
                  </li>
                );
              })}
            </ul>
          )}
        </div>
      );
    };

    // Course row — defined at module scope so its DOM persists across App
    // re-renders (keeps focus-restoration refs valid and avoids remount churn).
    const CourseRow = ({ c, t, dark, selectedTerm, onOpen }) => {
      const title = c.courseTitle || c.analyticsTitle || '';
      const label = `${c.subject}-${c.number}, ${title}. ` +
        (c.offered ? `ZTC adoption ${c.ztcPct === null ? 'no data' : c.ztcPct + '%'}, survey completion ${c.surveyPct === null ? 'no data' : c.surveyPct + '%'}, status ${c.status}.` : `Not offered in ${selectedTerm}.`) +
        (c.coZtc ? ' Chancellor\u2019s Office ZTC.' : '') +
        (c.found ? ' Activate for details.' : '');
      const inner = (
        <>
          <div className="min-w-0">
            <div className="font-mono text-sm font-semibold">{c.subject}-{c.number}</div>
          </div>
          <div className="min-w-0">
            <div className="text-sm truncate">{title}</div>
            <div className={`text-[11px] ${t.faint}`}>
              {c.units !== null ? `${fmtUnits(c.units)} units` : ''}
              {!c.offered && <span className="ml-1">· not offered {selectedTerm}</span>}
            </div>
          </div>
          <div className="flex items-center gap-2 sm:gap-3 justify-end">
            <div className="text-right hidden sm:block w-16">
              <div className={`text-[10px] ${t.faint} leading-none`}>survey</div>
              <div className="text-xs font-semibold">{c.surveyPct === null ? '—' : c.surveyPct + '%'}</div>
            </div>
            <div className="text-right w-12">
              <div className={`text-[10px] ${t.faint} leading-none`}>ZTC</div>
              <div className={`text-sm font-bold ${pctColor(c.ztcPct, dark)}`}>{c.ztcPct === null ? '—' : c.ztcPct + '%'}</div>
            </div>
            {c.coZtc && <CoBadge small dark={dark} />}
            <StatusBadge status={c.status} small dark={dark} />
          </div>
        </>
      );
      const cls = `w-full text-left grid grid-cols-[auto_1fr_auto] items-center gap-3 px-3 py-2 rounded-lg border ${t.cardBorder} ${t.card} transition-colors`;
      if (!c.found) {
        return <div className={cls} aria-label={label}>{inner}</div>;
      }
      return (
        <button type="button" onClick={(e) => onOpen(c, e.currentTarget)} aria-label={label} className={`${cls} ${t.cardHover} cursor-pointer`}>
          {inner}
        </button>
      );
    };

    // ============================================================
    // TREND CHART (Chart.js) — accessible: role=img + aria-label + sr-only table
    // ============================================================
    const TrendChart = ({ series, dark, height = 200, ariaLabel, summary, type = 'line' }) => {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);
      useEffect(() => {
        if (!canvasRef.current || !window.Chart) return;
        const grid = dark ? 'rgba(148,163,184,0.15)' : 'rgba(100,116,139,0.18)';
        const tick = dark ? '#cbd5e1' : '#475569';
        const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const isBar = type === 'bar';
        const ds = series.map(s => isBar ? ({
          label: s.label, data: s.data,
          backgroundColor: s.colors || (s.color + 'cc'), borderColor: s.colors || s.color, borderWidth: 1,
          borderRadius: 3, maxBarThickness: 26
        }) : ({
          label: s.label, data: s.data, borderColor: s.color, backgroundColor: s.color + '33',
          borderWidth: 2, pointRadius: 2.5, pointHoverRadius: 5, tension: 0.3, spanGaps: true, fill: false
        }));
        chartRef.current = new window.Chart(canvasRef.current, {
          type,
          data: { labels: series[0] ? series[0].labels : [], datasets: ds },
          options: {
            responsive: true, maintainAspectRatio: false,
            animation: reduce ? false : { duration: 400 },
            interaction: { mode: 'index', intersect: false },
            scales: {
              y: { min: 0, max: 100, ticks: { color: tick, callback: (v) => v + '%' }, grid: { color: grid } },
              x: { ticks: { color: tick, maxRotation: 0, autoSkip: true, maxTicksLimit: isBar ? 12 : 8 }, grid: { color: grid, display: !isBar } }
            },
            plugins: {
              legend: { display: ds.length > 1, labels: { color: tick, boxWidth: 12 } },
              tooltip: { callbacks: { label: (it) => `${it.dataset.label}: ${it.parsed.y === null ? 'n/a' : it.parsed.y + '%'}` } }
            }
          }
        });
        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [series, dark, type]);
      return (
        <div style={{ height }} role="img" aria-label={ariaLabel}>
          <canvas ref={canvasRef} aria-hidden="true"></canvas>
          {summary && <span className="sr-only">{summary}</span>}
        </div>
      );
    };

    // ============================================================
    // COURSE DETAIL (shared by the Courses view and the course modal)
    // Stat cards, ZTC section count, OER type breakdown, per-term trend,
    // and catalog link. `compact` renders the tighter modal layout.
    // ============================================================
    const CourseDetail = ({ c, analytics, selectedTerm, t, dark, compact = false, showCatalogLink = true }) => {
      const rec = analytics.index[c.key];
      const trend = rec ? sortTerms(Object.keys(rec.terms)).map(term => ({ term, pct: rec.terms[term].ztcPct })) : [];
      const m = c.metrics;
      const types = m ? [
        ['ZTC-A', m.ztca], ['ZTC-C', m.ztcc], ['ZTC-E', m.ztce],
        ['ZTC-F', m.ztcf], ['ZTC-G', m.ztcg], ['LCT', m.lct]
      ].filter(x => x[1] !== null) : [];
      const sectionPct = m && m.totalSec ? Math.round((m.ztcSec / m.totalSec) * 100) : null;
      const mb = compact ? 'mb-5' : 'mb-6';

      const trendChart = (
        <TrendChart dark={dark} height={compact ? 150 : 180} type="bar"
          ariaLabel={`Bar chart: ZTC adoption by term for ${c.subject}-${c.number}`}
          summary={'ZTC adoption by term: ' + trend.map(x => `${x.term} ${x.pct === null ? 'no data' : x.pct + '%'}`).join(', ') + '.'}
          series={[{
            label: 'ZTC adoption', labels: trend.map(x => x.term), data: trend.map(x => x.pct),
            colors: trend.map(x => x.term === selectedTerm ? '#3b82f6' : ringColor(x.pct))
          }]} />
      );

      return (
        <>
          {!c.offered ? (
            <div className={`rounded-xl border ${t.cardBorder} ${t.card} p-6 text-center ${mb}`}>
              <Icons.AlertCircle className="w-8 h-8 mx-auto mb-2 text-slate-400" aria-hidden="true" />
              <p className={`text-sm ${t.textMuted}`}>{c.found ? `No analytics for ${selectedTerm}. This course was not offered (or not reported) in the selected term.` : 'This course was not found in the Course Analytics datasource.'}</p>
            </div>
          ) : (
            <>
              <div className={`grid ${compact ? 'grid-cols-2 gap-3' : 'grid-cols-1 sm:grid-cols-2 gap-4'} ${mb}`}>
                <div className={`rounded-xl border-2 ${statusBorderCls(c.ztcPct)} ${compact ? 'p-4' : 'p-5'} text-center`}>
                  <div className={`text-[10px] uppercase ${dark ? t.faint : 'text-gray-700'} mb-1`}>ZTC adoption</div>
                  <div className={`text-4xl font-bold ${pctColor(c.ztcPct, dark)}`}>{c.ztcPct === null ? '—' : c.ztcPct + '%'}</div>
                  {compact && (
                    <div className="mt-1 flex flex-wrap items-center justify-center gap-1">
                      <StatusBadge status={c.status} dark={dark} />
                      {c.coZtc && <CoBadge dark={dark} />}
                    </div>
                  )}
                </div>
                <div className={`rounded-xl border ${t.cardBorder} ${t.card} ${compact ? 'p-4' : 'p-5'} text-center`}>
                  <div className={`text-[10px] uppercase ${dark ? t.faint : 'text-gray-700'} mb-1`}>Survey completion</div>
                  <div className="text-4xl font-bold">{c.surveyPct === null ? '—' : c.surveyPct + '%'}</div>
                  <div className={`text-[11px] ${t.faint} mt-1`}>
                    {m.surveysSub !== null ? `${m.surveysSub} submitted` : ''}{m.surveysPend ? ` · ${m.surveysPend} pending` : ''}
                  </div>
                </div>
              </div>

              {m.totalSec !== null && (
                <div className={`rounded-lg border ${t.cardBorder} ${t.card} p-3 ${mb} flex items-center gap-3`}>
                  <Icons.Shield className={`w-5 h-5 ${sectionPct >= ZTC_THRESHOLDS.ZTC_MIN ? 'text-green-400' : 'text-slate-400'}`} aria-hidden="true" />
                  <div className="text-xs">
                    <span className="font-semibold">{m.ztcSec ?? 0}/{m.totalSec} sections ZTC</span>
                    {sectionPct !== null && <span className={`ml-1 ${t.textMuted}`}>({sectionPct}%)</span>}
                    <span className={`ml-1 ${t.faint}`}>· Chaffey ZTC rule = 75%+ of sections</span>
                  </div>
                </div>
              )}

              {types.length > 0 && (
                <div className={mb}>
                  <h3 className={`text-xs font-semibold ${t.textMuted} uppercase mb-2`}>OER / ZTC type breakdown</h3>
                  <div className="grid grid-cols-3 gap-2">
                    {types.map(([label, val]) => (
                      <div key={label} className={`rounded-lg border ${t.cardBorder} ${t.card} p-2 text-center`}>
                        <div className={`text-[10px] ${t.faint}`}>{label}</div>
                        <div className="text-lg font-bold">{val}%</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </>
          )}

          {trend.filter(x => x.pct !== null).length > 1 && (
            compact ? (
              <div className="mb-5">
                <h4 className={`text-xs font-semibold ${t.textMuted} uppercase mb-2`}>ZTC adoption by term</h4>
                {trendChart}
              </div>
            ) : (
              <div className={`rounded-xl border ${t.cardBorder} ${t.card} p-5 mb-6`}>
                <h3 className="font-semibold mb-3 flex items-center gap-2"><Icons.LineChart className="w-4 h-4 text-blue-400" aria-hidden="true" /> ZTC adoption by term</h3>
                {trendChart}
              </div>
            )
          )}

          {showCatalogLink ? (
            <a href={`${COURSE_CATALOG_URL}${encodeURIComponent(c.subject + '-' + c.number)}`} target="_blank" rel="noopener noreferrer"
              className={`${compact ? 'flex w-full' : 'inline-flex'} items-center justify-center gap-2 px-4 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-semibold text-sm`}>
              <Icons.FileText className="w-4 h-4" aria-hidden="true" /> View in course catalog
            </a>
          ) : !compact && (
            <div role="note" tabIndex={0}
              className={`text-xs ${t.faint} text-center rounded px-2 py-1 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500`}>
              Catalog link available for current and future term only.
            </div>
          )}
        </>
      );
    };

    // ============================================================
    // MAIN APP
    // ============================================================
    const App = () => {
      const [darkMode, setDarkMode] = useState(() => {
        try {
          const themePref = localStorage.getItem(STORAGE_KEY + '-theme');
          return themePref ? themePref === 'dark' : true;
        } catch (e) { return true; }
      });
      const [programs, setPrograms] = useState(null);
      const [analytics, setAnalytics] = useState(null); // { index, terms }
      const [terms, setTerms] = useState([]);
      const [selectedTerm, setSelectedTerm] = useState('');
      const [selectedProgram, setSelectedProgram] = useState(null);
      const [search, setSearch] = useState('');
      const [typeFilter, setTypeFilter] = useState('all');
      const [pathwayAdoptionFilter, setPathwayAdoptionFilter] = useState('all');
      const [sortBy, setSortBy] = useState('adoption');
      const [view, setView] = useState('dashboard'); // 'dashboard' | 'program' | 'courses'
      const [selectedCourseKey, setSelectedCourseKey] = useState(null);
      const [courseStatusFilter, setCourseStatusFilter] = useState('all');
      const [selectedCourse, setSelectedCourse] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [pendingProgRows, setPendingProgRows] = useState(null);
      const [pendingAnalRows, setPendingAnalRows] = useState(null);
      const [savedAt, setSavedAt] = useState(null);
      const [exportOpen, setExportOpen] = useState(false);
      const [showTrend, setShowTrend] = useState(true);
      const [showFullRanking, setShowFullRanking] = useState(false);
      const [announce, setAnnounce] = useState('');
      const [storageNotice, setStorageNotice] = useState('');
      const [dragOverSlot, setDragOverSlot] = useState(null);
      const [landingAnnounce, setLandingAnnounce] = useState('');

      const exportMenuRef = useRef(null);
      const exportBtnRef = useRef(null);
      const courseModalRef = useRef(null);
      const lastFocusedRef = useRef(null);

      const t = darkMode ? THEME.dark : THEME.light;

      // ---- persistence ----
      useEffect(() => {
        try {
          const raw = localStorage.getItem(STORAGE_KEY) || localStorage.getItem(LEGACY_STORAGE_KEY);
          if (raw) {
            const d = JSON.parse(raw);
            if (d.programs && d.analytics) {
              setPrograms(d.programs);
              setAnalytics(d.analytics);
              setTerms(d.terms || []);
              setSelectedTerm(d.selectedTerm || (d.terms || [])[ (d.terms||[]).length - 1] || '');
              setSelectedProgram(d.programs[0]?.name || null);
              setSelectedCourseKey(Object.keys(d.analytics.index || {}).sort()[0] || null);
              setSavedAt(d.savedAt || null);
            }
          }
        } catch (e) { /* ignore */ }
      }, []);

      useEffect(() => {
        localStorage.setItem(STORAGE_KEY + '-theme', darkMode ? 'dark' : 'light');
        document.documentElement.classList.toggle('theme-light', !darkMode);
        document.documentElement.style.colorScheme = darkMode ? 'dark' : 'light';
      }, [darkMode]);

      // Export menu: dismiss on outside click / Escape (keyboard accessible)
      useEffect(() => {
        if (!exportOpen) return;
        const onDown = (e) => {
          if (exportMenuRef.current && !exportMenuRef.current.contains(e.target) &&
              exportBtnRef.current && !exportBtnRef.current.contains(e.target)) setExportOpen(false);
        };
        const onKey = (e) => { if (e.key === 'Escape') { setExportOpen(false); exportBtnRef.current && exportBtnRef.current.focus(); } };
        document.addEventListener('mousedown', onDown);
        document.addEventListener('keydown', onKey);
        return () => { document.removeEventListener('mousedown', onDown); document.removeEventListener('keydown', onKey); };
      }, [exportOpen]);

      // Course modal: focus the dialog, trap Tab, Escape to close, restore focus on close
      useEffect(() => {
        if (!selectedCourse) return;
        if (!lastFocusedRef.current) lastFocusedRef.current = document.activeElement;
        const node = courseModalRef.current;
        const getFocusable = () => node ? Array.from(node.querySelectorAll('a[href], button:not([disabled]), input, select, textarea, [tabindex]:not([tabindex="-1"])')) : [];
        const timer = setTimeout(() => { const f = getFocusable(); (f[0] || node) && (f[0] || node).focus(); }, 0);
        const onKey = (e) => {
          if (e.key === 'Escape') { e.preventDefault(); setSelectedCourse(null); return; }
          if (e.key === 'Tab') {
            const f = getFocusable(); if (!f.length) return;
            const first = f[0], last = f[f.length - 1];
            if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
            else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
          }
        };
        document.addEventListener('keydown', onKey);
        return () => {
          clearTimeout(timer);
          document.removeEventListener('keydown', onKey);
          const prev = lastFocusedRef.current;
          lastFocusedRef.current = null;
          if (prev && prev.focus && document.contains(prev)) prev.focus();
        };
      }, [selectedCourse]);

      // Announce context changes to assistive tech
      useEffect(() => {
        if (!programs || !selectedTerm) return;
        setAnnounce(view === 'dashboard'
          ? `Dashboard, institution-wide ZTC adoption, term ${selectedTerm}`
          : view === 'courses'
            ? `Courses, ${selectedCourseKey || 'none selected'}, term ${selectedTerm}`
            : `${selectedProgram || 'no pathway'}, term ${selectedTerm}`);
      }, [selectedProgram, selectedCourseKey, selectedTerm, view, programs]);

      const persist = (progs, anal, termList, term) => {
        try {
          const payload = { programs: progs, analytics: anal, terms: termList, selectedTerm: term, savedAt: new Date().toISOString() };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
          setSavedAt(payload.savedAt);
          setStorageNotice('');
        } catch (e) {
          console.warn('Could not persist dataset (storage limit). Data remains for this session.', e);
          setStorageNotice('Could not save data to this browser (storage limit). Your session will work until you close the tab.');
        }
      };

      const readFile = (file) => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve(parseCSV(e.target.result));
        reader.onerror = reject;
        reader.readAsText(file);
      });

      const isCsvFile = (file) => {
        const name = String(file.name || '').toLowerCase();
        return name.endsWith('.csv') || file.type === 'text/csv' || file.type === 'application/vnd.ms-excel';
      };

      const loadPendingCsv = async (slot, file) => {
        const label = slot === 'prog' ? 'Program Summary' : 'Course Analytics';
        if (!file || !isCsvFile(file)) {
          setError(`${label} must be a .csv file.`);
          return;
        }
        try {
          setError('');
          const rows = await readFile(file);
          if (slot === 'prog') setPendingProgRows(rows);
          else setPendingAnalRows(rows);
          setLandingAnnounce(`${label} loaded, ${rows.length - 1} rows.`);
        } catch (err) {
          setError(`Could not read ${label} file.`);
        }
      };

      const handleProgFile = async (e) => {
        const f = e.target.files[0];
        if (f) await loadPendingCsv('prog', f);
        e.target.value = '';
      };
      const handleAnalFile = async (e) => {
        const f = e.target.files[0];
        if (f) await loadPendingCsv('anal', f);
        e.target.value = '';
      };

      const uploadDropHandlers = (slot) => ({
        onDragEnter: (e) => { e.preventDefault(); e.stopPropagation(); setDragOverSlot(slot); },
        onDragOver: (e) => { e.preventDefault(); e.stopPropagation(); },
        onDragLeave: (e) => {
          e.preventDefault();
          if (!e.currentTarget.contains(e.relatedTarget)) setDragOverSlot(s => s === slot ? null : s);
        },
        onDrop: async (e) => {
          e.preventDefault();
          e.stopPropagation();
          setDragOverSlot(null);
          const file = e.dataTransfer?.files?.[0];
          if (file) await loadPendingCsv(slot, file);
        }
      });

      const uploadCardCls = (slot, loaded) => {
        if (loaded) return 'border-green-500/60 bg-green-500/5';
        if (dragOverSlot === slot) return darkMode ? 'border-blue-400 bg-blue-500/10' : 'border-blue-500 bg-blue-50';
        return t.cardBorder;
      };

      const buildDataset = () => {
        if (!pendingProgRows || !pendingAnalRows) return;
        setLoading(true); setError('');
        try {
          const anal = buildAnalytics(pendingAnalRows);
          const progs = buildPrograms(pendingProgRows);
          if (progs.length === 0) throw new Error('No active programs found in the Program Summary file.');
          const term = anal.terms[anal.terms.length - 1] || '';
          setAnalytics({ index: anal.index });
          setTerms(anal.terms);
          setSelectedTerm(term);
          setPrograms(progs);
          setSelectedProgram(progs[0].name);
          setSelectedCourseKey(Object.keys(anal.index).sort()[0] || null);
          setView('dashboard');
          setPendingProgRows(null);
          setPendingAnalRows(null);
          persist(progs, { index: anal.index }, anal.terms, term);
        } catch (err) {
          setError(err.message || 'Failed to build dataset.');
        } finally {
          setLoading(false);
        }
      };

      const resetData = () => {
        if (!confirm('Clear the loaded datasets and start over?')) return;
        localStorage.removeItem(STORAGE_KEY);
        setPrograms(null); setAnalytics(null); setTerms([]); setSelectedTerm('');
        setSelectedProgram(null); setSelectedCourseKey(null); setPendingProgRows(null); setPendingAnalRows(null); setSavedAt(null);
      };

      // ---- derived ----
      const activeProgram = useMemo(
        () => programs ? programs.find(p => p.name === selectedProgram) : null,
        [programs, selectedProgram]
      );
      const programView = useMemo(
        () => (activeProgram && analytics && selectedTerm) ? computeProgramView(activeProgram, analytics, selectedTerm) : null,
        [activeProgram, analytics, selectedTerm]
      );

      // adoption for every program at the selected term (for sidebar + dashboard)
      const programAdoption = useMemo(() => {
        if (!programs || !analytics || !selectedTerm) return {};
        const out = {};
        for (const p of programs) {
          const v = computeProgramView(p, analytics, selectedTerm);
          out[p.name] = {
            pct: v.adoptionPct, reqTotal: v.reqTotal, reqZtc: v.reqZtc,
            units: v.unitsRequired, survey: v.avgSurvey, coCount: v.coCount,
            coursesWithData: v.coursesWithData, coursesTotal: v.coursesTotal
          };
        }
        return out;
      }, [programs, analytics, selectedTerm]);

      const programTypes = useMemo(() => {
        if (!programs) return [];
        return Array.from(new Set(programs.map(p => p.type))).sort();
      }, [programs]);

      const filteredPrograms = useMemo(() => {
        if (!programs) return [];
        let list = programs.filter(p => {
          const pct = programAdoption[p.name]?.pct;
          return (typeFilter === 'all' || p.type === typeFilter)
            && (search.trim() === '' || p.name.toLowerCase().includes(search.toLowerCase()))
            && pathwayAdoptionMatches(pct, pathwayAdoptionFilter);
        });
        if (selectedProgram && !list.some(p => p.name === selectedProgram)) {
          const sel = programs.find(p => p.name === selectedProgram);
          if (sel) list = [sel, ...list];
        }
        const a = (n) => programAdoption[n]?.pct;
        list = list.slice().sort((x, y) => {
          if (sortBy === 'name') return x.name.localeCompare(y.name);
          if (sortBy === 'units') return (programAdoption[y.name]?.units || 0) - (programAdoption[x.name]?.units || 0);
          return cmpNullLast(a(x.name), a(y.name), () => x.name.localeCompare(y.name));
        });
        return list;
      }, [programs, typeFilter, pathwayAdoptionFilter, search, sortBy, programAdoption, selectedProgram]);

      const recentTerms = useMemo(() => new Set(getRecentTerms(terms, 2)), [terms]);

      const allCourses = useMemo(() => {
        if (!analytics || !selectedTerm) return [];
        return Object.keys(analytics.index).sort().map(key => enrichCourseFromKey(key, analytics, selectedTerm));
      }, [analytics, selectedTerm]);

      const filteredCourses = useMemo(() => {
        const q = search.trim().toLowerCase();
        let list = allCourses.filter(c => {
          const label = `${c.subject}-${c.number} ${c.courseTitle || c.analyticsTitle || ''}`.toLowerCase();
          const statusOk = courseStatusMatches(c, courseStatusFilter);
          const searchOk = q === '' || label.includes(q);
          return statusOk && searchOk;
        });
        list = list.slice().sort((x, y) => {
          const byCode = () => `${x.subject}-${x.number}`.localeCompare(`${y.subject}-${y.number}`);
          if (sortBy === 'name') return byCode();
          if (sortBy === 'survey') return cmpNullLast(x.surveyPct, y.surveyPct, byCode);
          return cmpNullLast(x.ztcPct, y.ztcPct, byCode);
        });
        return list;
      }, [allCourses, courseStatusFilter, search, sortBy]);

      const activeCourse = useMemo(() => {
        if (!selectedCourseKey || !analytics || !selectedTerm) return null;
        return enrichCourseFromKey(selectedCourseKey, analytics, selectedTerm);
      }, [selectedCourseKey, analytics, selectedTerm]);

      // Keep a valid course selected in Courses view when filters change
      useEffect(() => {
        if (view !== 'courses' || !filteredCourses.length) return;
        if (!selectedCourseKey || !filteredCourses.some(c => c.key === selectedCourseKey)) {
          setSelectedCourseKey(filteredCourses[0].key);
        }
      }, [view, filteredCourses, selectedCourseKey]);

      // institution-wide stats (all active pathways — global dashboard)
      const institution = useMemo(() => {
        if (!programs) return null;
        const base = computeInstitutionStats(programs, programAdoption);
        let chaffeyZtcCourses = 0, coZtcCourses = 0, coursesOffered = 0;
        if (analytics && selectedTerm) {
          for (const key of Object.keys(analytics.index)) {
            const c = enrichCourseFromKey(key, analytics, selectedTerm);
            if (c.offered) {
              coursesOffered++;
              if (c.ztcPct !== null && c.ztcPct >= ZTC_THRESHOLDS.ZTC_MIN) chaffeyZtcCourses++;
              if (c.coZtc) coZtcCourses++;
            }
          }
        }
        return { ...base, chaffeyZtcCourses, coZtcCourses, coursesOffered };
      }, [programs, programAdoption, analytics, selectedTerm]);

      const needsAttention = useMemo(() => {
        if (!programs) return [];
        return programs
          .map(p => ({ name: p.name, type: p.type, ...programAdoption[p.name] }))
          .filter(p => p.pct !== null && p.pct !== undefined && p.pct < ZTC_THRESHOLDS.PARTIAL_MIN)
          .sort((a, b) => a.pct - b.pct)
          .slice(0, 5);
      }, [programs, programAdoption]);

      // Trend: selected program's ZTC adoption + avg survey completion across all terms
      const programTrend = useMemo(() => {
        if (!activeProgram || !analytics || !terms.length) return null;
        const ztc = [], survey = [];
        for (const tm of terms) {
          const v = computeProgramView(activeProgram, analytics, tm);
          ztc.push(v.adoptionPct);
          survey.push(v.avgSurvey);
        }
        return { labels: terms, ztc, survey };
      }, [activeProgram, analytics, terms]);

      // Trend: institution-wide average ZTC adoption + survey completion (all pathways)
      const institutionTrend = useMemo(() => {
        if (!programs || !analytics || !terms.length) return null;
        const avg = [], survey = [], scored = [];
        for (const tm of terms) {
          let ztcSum = 0, ztcN = 0, surveySum = 0, surveyN = 0;
          for (const p of programs) {
            const v = computeProgramView(p, analytics, tm);
            if (v.adoptionPct !== null) { ztcSum += v.adoptionPct; ztcN++; }
            if (v.avgSurvey !== null) { surveySum += v.avgSurvey; surveyN++; }
          }
          avg.push(ztcN ? Math.round(ztcSum / ztcN) : null);
          survey.push(surveyN ? Math.round(surveySum / surveyN) : null);
          scored.push(ztcN);
        }
        return { labels: terms, avg, survey, scored };
      }, [programs, analytics, terms]);

      const switchView = (next) => {
        if ((view === 'program' && next === 'courses') || (view === 'courses' && next === 'program')) {
          setSearch('');
        }
        if (view === 'program' && next !== 'program') setPathwayAdoptionFilter('all');
        if (view === 'courses' && next !== 'courses') setCourseStatusFilter('all');
        if (next === 'courses' && sortBy === 'units') setSortBy('adoption');
        if (next === 'program' && sortBy === 'survey') setSortBy('adoption');
        setView(next);
      };

      const navigateFromOverviewKpi = (action) => {
        setSearch('');
        if (action.view === 'program') {
          setTypeFilter('all');
          setPathwayAdoptionFilter(action.pathwayAdoptionFilter || 'all');
          setSortBy(action.sortBy || 'adoption');
          setCourseStatusFilter('all');
          const pctOf = (n) => programAdoption[n]?.pct;
          const list = programs.slice().filter(p => pathwayAdoptionMatches(programAdoption[p.name]?.pct, action.pathwayAdoptionFilter || 'all')).sort((x, y) => {
            if ((action.sortBy || 'adoption') === 'name') return x.name.localeCompare(y.name);
            return cmpNullLast(pctOf(x.name), pctOf(y.name), () => x.name.localeCompare(y.name));
          });
          if (list.length) setSelectedProgram(list[0].name);
          switchView('program');
        } else {
          setPathwayAdoptionFilter('all');
          setTypeFilter('all');
          setCourseStatusFilter(action.courseStatusFilter || 'all');
          setSortBy('adoption');
          const list = allCourses.slice().filter(c => courseStatusMatches(c, action.courseStatusFilter || 'all')).sort((x, y) => cmpNullLast(x.ztcPct, y.ztcPct, () => `${x.subject}-${x.number}`.localeCompare(`${y.subject}-${y.number}`)));
          if (list.length) setSelectedCourseKey(list[0].key);
          switchView('courses');
        }
      };

      const trendSummary = (labels, series) => labels.map((l, i) => {
        const parts = series.map(s => `${s.name} ${s.data[i] === null ? 'no data' : s.data[i] + '%'}`).join(', ');
        return `${l}: ${parts}`;
      }).join('; ');

      // ============================================================
      // LANDING (two-source loader)
      // ============================================================
      if (!programs || !analytics) {
        return (
          <div className={`h-screen ${t.bg} ${t.text} flex flex-col overflow-hidden`}>
            <div className="flex-1 min-h-0 overflow-y-auto flex items-center justify-center p-6 pb-3">
            <div className="max-w-2xl w-full">
              <div className="flex items-center gap-3 mb-2">
                <Icons.Landmark className={`w-8 h-8 ${darkMode ? 'text-blue-400' : 'text-blue-700'}`} aria-hidden="true" />
                <h1 className="text-3xl font-bold">ZTC Pathway Mapper</h1>
              </div>
              <p className={`${t.textMuted} mb-8`}>
                Load two datasources to map Zero Textbook Cost adoption across every active degree, certificate, and transfer pathway.
              </p>

              {error && (
                <div role="alert" className={`mb-6 flex items-start gap-2 rounded-lg border border-red-500/50 bg-red-500/10 p-4 text-sm ${darkMode ? 'text-red-300' : 'text-red-800'}`}>
                  <Icons.AlertCircle className="w-5 h-5 flex-shrink-0" aria-hidden="true" /> <span>{error}</span>
                </div>
              )}

              <div className="sr-only" role="status" aria-live="polite">{landingAnnounce}</div>

              <div className="grid gap-4 sm:grid-cols-2">
                <label {...uploadDropHandlers('prog')}
                  className={`cursor-pointer rounded-xl border-2 border-dashed ${uploadCardCls('prog', pendingProgRows)} ${t.card} p-6 flex flex-col items-center text-center transition-colors`}>
                  {pendingProgRows ? <Icons.CheckCircle className={`w-8 h-8 mb-2 ${darkMode ? 'text-green-400' : 'text-green-700'}`} aria-hidden="true" /> : <Icons.BookOpen className={`w-8 h-8 mb-2 ${darkMode ? 'text-blue-400' : 'text-blue-700'}`} aria-hidden="true" />}
                  <div className="font-semibold mb-1">1. Program Summary</div>
                  <div className={`text-xs ${t.textMuted} mb-3`}>Program / certificate / degree structure (course blocks &amp; units)</div>
                  <div className={`text-xs font-medium ${pendingProgRows ? (darkMode ? 'text-green-400' : 'text-green-700') : (darkMode ? 'text-blue-400' : 'text-blue-700')}`}>
                    {pendingProgRows ? `Loaded · ${pendingProgRows.length - 1} rows` : 'Choose CSV or drop file…'}
                  </div>
                  <input type="file" accept=".csv,text/csv" className="sr-only" aria-label="Upload Program Summary CSV" onChange={handleProgFile} />
                </label>

                <label {...uploadDropHandlers('anal')}
                  className={`cursor-pointer rounded-xl border-2 border-dashed ${uploadCardCls('anal', pendingAnalRows)} ${t.card} p-6 flex flex-col items-center text-center transition-colors`}>
                  {pendingAnalRows ? <Icons.CheckCircle className={`w-8 h-8 mb-2 ${darkMode ? 'text-green-400' : 'text-green-700'}`} aria-hidden="true" /> : <Icons.BarChart3 className={`w-8 h-8 mb-2 ${darkMode ? 'text-blue-400' : 'text-blue-700'}`} aria-hidden="true" />}
                  <div className="font-semibold mb-1">2. Course Analytics</div>
                  <div className={`text-xs ${t.textMuted} mb-3`}>ZTC adoption % &amp; survey completion by course &amp; term</div>
                  <div className={`text-xs font-medium ${pendingAnalRows ? (darkMode ? 'text-green-400' : 'text-green-700') : (darkMode ? 'text-blue-400' : 'text-blue-700')}`}>
                    {pendingAnalRows ? `Loaded · ${pendingAnalRows.length - 1} rows` : 'Choose CSV or drop file…'}
                  </div>
                  <input type="file" accept=".csv,text/csv" className="sr-only" aria-label="Upload Course Analytics CSV" onChange={handleAnalFile} />
                </label>
              </div>

              <button type="button"
                onClick={buildDataset}
                disabled={!pendingProgRows || !pendingAnalRows || loading}
                className={`mt-6 w-full rounded-lg px-4 py-3 font-semibold transition-colors flex items-center justify-center gap-2 ${(!pendingProgRows || !pendingAnalRows || loading) ? (darkMode ? 'bg-slate-700 text-slate-300 cursor-not-allowed' : 'bg-gray-300 text-gray-600 cursor-not-allowed') : 'bg-blue-600 hover:bg-blue-700 text-white'}`}>
                {loading ? <><Icons.Refresh className="w-5 h-5 animate-spin" aria-hidden="true" /> Building…</> : <>Build dashboard <Icons.ChevronRight className="w-5 h-5" aria-hidden="true" /></>}
              </button>
